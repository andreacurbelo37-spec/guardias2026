<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COVISUEL - Sistema de Guardias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Panel Izquierdo */
        .left-panel {
            width: 320px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo-container {
            text-align: center;
            padding: 10px;
        }

        .logo-container img {
            max-width: 120px;
            border-radius: 50%;
            border: 3px solid #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }

        .app-title {
            text-align: center;
            font-size: 1.5em;
            color: #4facfe;
            margin-bottom: 10px;
        }

        .socio-selector {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
        }

        .socio-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #4facfe;
        }

        .socio-selector select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .contador-guardias {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }

        .contador-guardias.visible {
            display: block;
        }

        .contador-guardias h3 {
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .contador-items {
            display: flex;
            justify-content: space-around;
        }

        .contador-item {
            text-align: center;
        }

        .contador-item .numero {
            font-size: 2em;
            font-weight: bold;
        }

        .contador-item .label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        /* Panel Principal */
        .main-panel {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        .btn-excel {
            background: #217346;
            color: white;
        }

        .btn-compliance {
            background: #f39c12;
            color: white;
        }

        .btn-admin {
            background: #e74c3c;
            color: white;
        }

        .nav-buttons button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Navegación del Calendario */
        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .calendar-nav button {
            background: #4facfe;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .calendar-nav button:hover {
            background: #3d8bd9;
        }

        .calendar-nav span {
            font-size: 1.3em;
            font-weight: bold;
            min-width: 200px;
            text-align: center;
        }

        /* Calendario */
        .calendar {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .calendar-header div {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            color: #4facfe;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px;
            min-height: 70px;
        }

        .calendar-day:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }

        .calendar-day.empty {
            background: transparent;
            cursor: default;
        }

        .calendar-day.empty:hover {
            transform: none;
        }

        .calendar-day .day-number {
            font-size: 1.2em;
            font-weight: bold;
        }

        .calendar-day .turnos {
            display: flex;
            gap: 3px;
            margin-top: 5px;
        }

        .turno-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .turno-tarde { background: #f39c12; }
        .turno-noche { background: #3498db; }

        .turno-verde { background: #27ae60; }
        .turno-amarillo { background: #f1c40f; }
        .turno-rojo { background: #e74c3c; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #4facfe;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        .turno-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .turno-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s;
        }

        .turno-btn.tarde {
            background: rgba(243, 156, 18, 0.2);
            color: #f39c12;
            border-color: #f39c12;
        }

        .turno-btn.noche {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border-color: #3498db;
        }

        .turno-btn.selected {
            transform: scale(1.05);
        }

        .turno-btn.tarde.selected {
            background: #f39c12;
            color: white;
        }

        .turno-btn.noche.selected {
            background: #3498db;
            color: white;
        }

        .tipo-registro {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tipo-btn {
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tipo-btn:hover {
            border-color: #4facfe;
        }

        .tipo-btn.selected {
            background: #4facfe;
            border-color: #4facfe;
        }

        .campo-adicional {
            display: none;
            margin-top: 15px;
        }

        .campo-adicional.visible {
            display: block;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s;
        }

        .btn-confirmar {
            background: #27ae60;
            color: white;
        }

        .btn-cancelar {
            background: #e74c3c;
            color: white;
        }

        .btn-confirmar:hover, .btn-cancelar:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Registros del día */
        .registros-dia {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .registros-dia h4 {
            margin-bottom: 10px;
            color: #4facfe;
        }

        .registro-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .registro-info {
            display: flex;
            flex-direction: column;
        }

        .registro-turno {
            font-weight: bold;
        }

        .registro-turno.tarde { color: #f39c12; }
        .registro-turno.noche { color: #3498db; }

        .btn-eliminar {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Loading */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: white;
            font-size: 1.1em;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }

            .calendar-header div {
                font-size: 0.8em;
                padding: 5px;
            }

            .calendar-day {
                min-height: 50px;
            }

            .calendar-day .day-number {
                font-size: 1em;
            }

            .nav-buttons button {
                padding: 8px 15px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>

    <div class="container">
        <!-- Panel Izquierdo -->

            <div class="logo-container">

                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div class="modal" id="modalRegistro">
        <div class="modal-content">
            <h2 id="modalTitulo">Registrar Guardia</h2>
            
            <div class="turno-buttons">
                <button class="turno-btn tarde" onclick="seleccionarTurno('tarde')">☀️ TARDE</button>
                <button class="turno-btn noche" onclick="seleccionarTurno('noche')">🌙 NOCHE</button>

            <div class="form-group">
                <label>Tipo de Registro:</label>
                <div class="tipo-registro">
                    <button class="tipo-btn selected" onclick="seleccionarTipo('titular')">👤 Titular</button>
                    <button class="tipo-btn" onclick="seleccionarTipo('colaborador')">🤝 Colaborador</button>

            </div>

            <div class="campo-adicional" id="campoColaborador">

                    <label>Seleccionar socio al que ayuda:</label>
                    <select id="selectColaborador"></select>

            <div class="campo-adicional" id="campoNucleo">

            <div class="registros-dia" id="registrosDia"></div>

            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-confirmar" onclick="confirmarRegistro()">✅ Confirmar</button>

    <!-- Modal Admin -->

                <input type="password" id="adminPassword" placeholder="Ingrese contraseña">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancelar" onclick="cerrarModalAdmin()">Cancelar</button>
                <button class="btn-confirmar" onclick="verificarAdmin()">Ingresar</button>
            </div>
        </div>

    <script>
        // ==================== CONFIGURACIÓN ====================
       const API_URL = 'https://script.google.com/macros/s/AKfycbxgP-EouALIzuMMZoKXVUNJ7h61SXdbzTglmuDvgvNXQR3x5YP--qnAEgfKMUsEx3tN/exec';
        
        // SOCIOS CORRECTOS DE COVISUEL
        const SOCIOS = [
            {id: 215, nombre: "Mary Yacqueline Cunha Gómez"},
            {id: 222, nombre: "Mariana Gissel Arias D'ottone"},
            {id: 223, nombre: "Claudia Erika Peña Mármol"},
            {id: 225, nombre: "Stephanie Arias"},
            {id: 228, nombre: "Eduardo Sequeira"},
            {id: 230, nombre: "Alejandra Cabrera"},
            {id: 236, nombre: "Jorge Almada"},
            {id: 237, nombre: "Gonzalo Correa"},
            {id: 238, nombre: "Pablo Mercadal"},
            {id: 239, nombre: "Verónica Echevarría"},
            {id: 240, nombre: "Andrea Curbelo"},
            {id: 241, nombre: "Washington Villar"},
            {id: 242, nombre: "Sabrina Aguilar"},
            {id: 243, nombre: "Soraya Buelmo"},
            {id: 244, nombre: "Marlon Goes"},
            {id: 245, nombre: "Virginia Diaz"},
            {id: 246, nombre: "Oscar Ibarra"},
            {id: 247, nombre: "Claudia Sequeira"},
            {id: 248, nombre: "Claudia Buelmo"},
            {id: 249, nombre: "Mayra Buelmo"},
            {id: 251, nombre: "Adriana Menéndez"},
            {id: 253, nombre: "Juan Pablo Gallulo"},
            {id: 254, nombre: "Belén González"},
            {id: 256, nombre: "Francesca Delgado"},
            {id: 257, nombre: "Juan Rosa"},
            {id: 258, nombre: "Florencia Muñoz"},
            {id: 259, nombre: "Jorge Coímbra"},
            {id: 261, nombre: "Roberto Martínez"},
            {id: 262, nombre: "Katherine Cheda"},
            {id: 265, nombre: "Kevin Guaraglia"},
            {id: 266, nombre: "María Noel Carbajal"},
            {id: 267, nombre: "Martin Salfibia"},
            {id: 268, nombre: "Maximiliano Cisnero"},
            {id: 269, nombre: "Claudia Rios"}
        ];

        const ADMINS = [240, 245, 253, 266]; // Andrea, Virginia, Juan Pablo, María Noel
        const ADMIN_PASSWORD = "Molas2026";

        // ==================== ESTADO ====================
        let currentMonth = 3; // Abril (0-indexed)
        let currentYear = 2026;
        let selectedSocio = null;
        let selectedDate = null;
        let selectedTurno = null;
        let selectedTipo = 'titular';
        let guardias = [];
        let isAdmin = false;

        // ==================== INICIALIZACIÓN ====================
        document.addEventListener('DOMContentLoaded', function() {
            cargarSocios();
            cargarGuardias();
        });

        function cargarSocios() {
            const select = document.getElementById('socioSelect');
            const selectColaborador = document.getElementById('selectColaborador');
            
            SOCIOS.forEach(socio => {
                const option = document.createElement('option');
                option.value = socio.id;
                option.textContent = `${socio.id} - ${socio.nombre}`;
                select.appendChild(option);
                selectColaborador.appendChild(option.cloneNode(true));
            });
        }

        // ==================== API GOOGLE SHEETS ====================
        async function cargarGuardias() {
            showLoading(true);
            try {
               const response = await fetch(`${API_URL}?action=getGuardias`);
                const data = await response.json();
               guardias = data.data || [];
                renderCalendar();
                actualizarContador();
            } catch (error) {
                console.error('Error cargando guardias:', error);
                guardias = [];
                renderCalendar();
            }
            showLoading(false);
        }

        async function guardarGuardia(guardia) {
            showLoading(true);
            try {
                const params = new URLSearchParams({
                    action: 'registrar',
                    fecha: guardia.fecha,
                    turno: guardia.turno,
                    socioId: guardia.socioId,
                    socioNombre: guardia.socioNombre,
                    timestamp: guardia.timestamp,
                    detalle: guardia.detalle || ''
                });
                
                await fetch(`${API_URL}?${params.toString()}`);
                await cargarGuardias();
            } catch (error) {
                console.error('Error guardando guardia:', error);
                alert('Error al guardar. Intente nuevamente.');
            }
            showLoading(false);
        }

       async function eliminarGuardia(fecha, turno, socioId) {
    if (!confirm('¿Eliminar este registro?')) return;
    
    showLoading(true);
    console.log('Enviando:', fecha, turno, socioId);
    
    try {
        const params = new URLSearchParams({
            action: 'cancelar',
            fecha: fecha,
            turno: turno,
            socioId: String(socioId)
        });
        
        const response = await fetch(`${API_URL}?${params.toString()}`);
        const result = await response.json();
        console.log('Result:', result);
        
        if (result.success) {
            await cargarGuardias();
            mostrarRegistrosDelDia(fecha.substring(0,10));
        } else {
            alert('Error al eliminar: ' + (result.error || 'Error desconocido'));
        }
    } catch (error) {
        console.error('Error eliminando guardia:', error);
        alert('Error al eliminar. Intente nuevamente.');
    }
    showLoading(false);
}


        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        // ==================== CALENDARIO ====================
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const mesActual = document.getElementById('mesActual');
            
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            mesActual.textContent = `${meses[currentMonth]} ${currentYear}`;
            
            const primerDia = new Date(currentYear, currentMonth, 1);
            const ultimoDia = new Date(currentYear, currentMonth + 1, 0);
            const diasEnMes = ultimoDia.getDate();
            const diaInicio = primerDia.getDay();
            
            grid.innerHTML = '';
            
            // Días vacíos al inicio
            for (let i = 0; i < diaInicio; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                grid.appendChild(emptyDay);
            }
            
            // Días del mes
            for (let dia = 1; dia <= diasEnMes; dia++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                
                const fechaStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                
                const guardiasDelDia = guardias.filter(g => g.fecha.substring(0,10) === fechaStr);
                const tardeCant = guardiasDelDia.filter(g => g.turno === 'tarde').length;
                const nocheCant = guardiasDelDia.filter(g => g.turno === 'noche').length;
                
                dayElement.innerHTML = `
                    <span class="day-number">${dia}</span>
                    <div class="turnos">
                        ${tardeCant > 0 ? `<span class="turno-indicator ${getColorClass(tardeCant)}" title="Tarde: ${tardeCant}/3">T${tardeCant}</span>` : ''}
                        ${nocheCant > 0 ? `<span class="turno-indicator ${getColorClass(nocheCant)}" style="background:#3498db" title="Noche: ${nocheCant}/3">N${nocheCant}</span>` : ''}
                    </div>
                `;
                
                dayElement.onclick = () => abrirModal(dia, fechaStr);
                grid.appendChild(dayElement);
            }
        }

        function getColorClass(cantidad) {
            if (cantidad >= 3) return 'turno-rojo';
            if (cantidad === 2) return 'turno-amarillo';
            return 'turno-verde';
        }

        function mesAnterior() {
            if (currentMonth === 3 && currentYear === 2026) return;
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
            actualizarContador();
        }

        function mesSiguiente() {
            if (currentMonth === 11 && currentYear === 2027) return;
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
            actualizarContador();
        }

        // ==================== SELECCIÓN DE SOCIO ====================
        function seleccionarSocio() {
            const select = document.getElementById('socioSelect');
            const socioId = parseInt(select.value);
            
            if (socioId) {
                selectedSocio = SOCIOS.find(s => s.id === socioId);
                document.getElementById('contadorGuardias').classList.add('visible');
                actualizarContador();
            } else {
                selectedSocio = null;
                document.getElementById('contadorGuardias').classList.remove('visible');
            }
        }

        function actualizarContador() {
            if (!selectedSocio) return;
            
            const guardiasSocioMes = guardias.filter(g => {
                const fecha = new Date(g.fecha);
                return g.socioId == selectedSocio.id && 
                       fecha.getMonth() === currentMonth && 
                       fecha.getFullYear() === currentYear;
            });
            
            const tarde = guardiasSocioMes.filter(g => g.turno === 'tarde').length;
            const noche = guardiasSocioMes.filter(g => g.turno === 'noche').length;
            
            document.getElementById('contadorTarde').textContent = `${tarde}/2`;
            document.getElementById('contadorNoche').textContent = `${noche}/3`;
            
            document.getElementById('contadorTarde').style.color = tarde >= 2 ? '#e74c3c' : 'white';
            document.getElementById('contadorNoche').style.color = noche >= 3 ? '#e74c3c' : 'white';
        }

        // ==================== MODAL ====================
        function abrirModal(dia, fechaStr) {
            if (!selectedSocio) {
                alert('⚠️ Primero seleccioná un socio');
                return;
            }
            
            selectedDate = fechaStr;
            selectedTurno = null;
            selectedTipo = 'titular';
            
            document.getElementById('modalTitulo').textContent = `📅 ${dia}/${currentMonth + 1}/${currentYear}`;
            
            document.querySelectorAll('.turno-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('.tipo-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector('.tipo-btn').classList.add('selected');
            document.getElementById('campoColaborador').classList.remove('visible');
            document.getElementById('campoNucleo').classList.remove('visible');
            document.getElementById('inputNucleo').value = '';
            
            mostrarRegistrosDelDia(fechaStr);
            
            document.getElementById('modalRegistro').classList.add('active');
        }

        function mostrarRegistrosDelDia(fecha) {
            const container = document.getElementById('registrosDia');
            const registros = guardias.filter(g => g.fecha.substring(0,10) === fecha);
            
            if (registros.length === 0) {
                container.innerHTML = '<p style="opacity: 0.7; text-align: center;">No hay registros para este día</p>';
                return;
            }
            
            let html = '<h4>Registros del día:</h4>';
            registros.forEach(r => {
                const esPropio = r.socioId == selectedSocio.id;
                const puedeEliminar = esPropio || isAdmin;
                
                html += `
                    <div class="registro-item">
                        <div class="registro-info">
                            <span class="registro-turno ${r.turno}">${r.turno === 'tarde' ? '☀️' : '🌙'} ${r.turno.toUpperCase()}</span>
                            <span>${r.socioNombre} (${r.timestamp})</span>
                            ${r.detalle ? `<small style="opacity:0.7">${r.detalle}</small>` : ''}
                        </div>
                        ${puedeEliminar ? `<button class="btn-eliminar" onclick="event.stopPropagation(); eliminarGuardia('${r.fecha.substring(0,10)}', '${r.turno}', '${r.socioId}')">🗑️</button>` : ''}

                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function cerrarModal() {
            document.getElementById('modalRegistro').classList.remove('active');
        }

        function seleccionarTurno(turno) {
            selectedTurno = turno;
            document.querySelectorAll('.turno-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelector(`.turno-btn.${turno}`).classList.add('selected');
        }

        function seleccionarTipo(tipo) {
            selectedTipo = tipo;
            document.querySelectorAll('.tipo-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            
            document.getElementById('campoColaborador').classList.toggle('visible', tipo === 'colaborador');
            document.getElementById('campoNucleo').classList.toggle('visible', tipo === 'nucleo');
        }

        async function confirmarRegistro() {
            if (!selectedTurno) {
                alert('⚠️ Seleccioná un turno (Tarde o Noche)');
                return;
            }
            
            // Verificar si ya está registrado
            const yaRegistrado = guardias.find(g => 
                g.fecha === selectedDate && 
                g.turno === selectedTurno && 
                g.socioId == selectedSocio.id
            );
            
            if (yaRegistrado) {
                alert('⚠️ Ya estás registrado en este turno');
                return;
            }
            
            // Verificar límites mensuales
            const guardiasSocioMes = guardias.filter(g => {
                const fecha = new Date(g.fecha);
                return g.socioId == selectedSocio.id && 
                       fecha.getMonth() === currentMonth && 
                       fecha.getFullYear() === currentYear &&
                       g.turno === selectedTurno;
            });
            
            const limite = selectedTurno === 'tarde' ? 2 : 3;
            if (guardiasSocioMes.length >= limite) {
                alert(`⚠️ Ya alcanzaste el límite de ${limite} guardias de ${selectedTurno} este mes`);
                return;
            }
            
            // Verificar capacidad del día
            const guardiasDelDia = guardias.filter(g => g.fecha === selectedDate && g.turno === selectedTurno);
            if (guardiasDelDia.length >= 3) {
                alert('⚠️ Este turno ya tiene 3 personas registradas');
                return;
            }
            
            let detalle = '';
            if (selectedTipo === 'colaborador') {
                const colaboradorId = document.getElementById('selectColaborador').value;
                const colaborador = SOCIOS.find(s => s.id == colaboradorId);
                if (!colaborador) {
                    alert('⚠️ Seleccioná al socio que ayudás');
                    return;
                }
                detalle = `Ayuda a: ${colaborador.nombre}`;
            } else if (selectedTipo === 'nucleo') {
                detalle = document.getElementById('inputNucleo').value.trim();
                if (!detalle) {
                    alert('⚠️ Ingresá el nombre del familiar');
                    return;
                }
            }
            
            const guardia = {
                fecha: selectedDate,
                turno: selectedTurno,
                socioId: selectedSocio.id,
                socioNombre: selectedSocio.nombre,
                timestamp: selectedTipo,
                detalle: detalle
            };
            
            await guardarGuardia(guardia);
            cerrarModal();
            alert('✅ Guardia registrada correctamente');
        }

        // ==================== ADMIN ====================
        function abrirAdmin() {
            document.getElementById('modalAdmin').classList.add('active');
        }

        function cerrarModalAdmin() {
            document.getElementById('modalAdmin').classList.remove('active');
            document.getElementById('adminPassword').value = '';
        }

        function verificarAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                alert('✅ Acceso de administrador activado\n\nAhora podés eliminar cualquier registro.');
                cerrarModalAdmin();
            } else {
                alert('❌ Contraseña incorrecta');
            }
        }

        // ==================== EXPORTAR ====================
        function exportarWhatsApp() {
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            let mensaje = `🛡️ *GUARDIAS COVISUEL*\n📅 ${meses[currentMonth]} ${currentYear}\n\n`;
            
            const guardiasMes = guardias.filter(g => {
                const fecha = new Date(g.fecha);
                return fecha.getMonth() === currentMonth && fecha.getFullYear() === currentYear;
            }).sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            
            if (guardiasMes.length === 0) {
                mensaje += 'No hay guardias registradas este mes.';
            } else {
                let fechaAnterior = '';
                guardiasMes.forEach(g => {
                    const fecha = new Date(g.fecha);
                    const fechaStr = `${fecha.getDate()}/${currentMonth + 1}`;
                    
                    if (fechaStr !== fechaAnterior) {
                        mensaje += `\n📆 *${fechaStr}*\n`;
                        fechaAnterior = fechaStr;
                    }
                    
                    const emoji = g.turno === 'tarde' ? '☀️' : '🌙';
                    mensaje += `${emoji} ${g.turno.toUpperCase()}: ${g.socioNombre}\n`;
                });
            }
            
            const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        function exportarExcel() {
            let csv = 'Fecha;Turno;ID Socio;Nombre;Tipo;Detalle\n';
            
            const guardiasMes = guardias.filter(g => {
                const fecha = new Date(g.fecha);
                return fecha.getMonth() === currentMonth && fecha.getFullYear() === currentYear;
            }).sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                      
guardiasMes.forEach(g => {
    let fechaFormato = new Date(g.fecha).toISOString().split('T')[0];
csv += `${fechaFormato};${g.turno};${g.socioId};${g.socioNombre};${g.turno};${g.detalle || ''}\n`;
});

const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
const link = document.createElement('a');
link.href = URL.createObjectURL(blob);
link.download = `guardias_covisuel_${currentMonth + 1}_${currentYear}.csv`;
link.click();
}
