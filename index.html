<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Guardias 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 10px;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            padding: 15px;
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-mes {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .nav-mes button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .nav-mes button:hover {
            background: #00ff88;
            transform: scale(1.05);
        }
        
        .mes-actual {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00d4ff;
            min-width: 150px;
            text-align: center;
        }
        
        .calendario {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin: 15px 0;
        }
        
        .dia-header {
            background: #2d3748;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
            border-radius: 5px;
            color: #00d4ff;
        }
        
        .dia {
            background: #2d3748;
            padding: 8px;
            min-height: 70px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .dia:hover {
            background: #3d4758;
            transform: scale(1.02);
        }
        
        .dia.vacio {
            background: transparent;
            cursor: default;
        }
        
        .dia.vacio:hover {
            transform: none;
        }
        
        .dia-numero {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 5px;
        }
        
        .dia.tiene-guardia {
            background: linear-gradient(135deg, #1e5128, #2d7a3e);
            border: 2px solid #00ff88;
        }
        
        .indicadores {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .indicador {
            font-size: 0.6rem;
            padding: 2px 4px;
            border-radius: 3px;
            text-align: center;
        }
        
        .indicador.tarde {
            background: #ff6b35;
            color: white;
        }
        
        .indicador.noche {
            background: #4a00e0;
            color: white;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }
        
        .modal.activo {
            display: flex;
        }
        
        .modal-contenido {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid #00d4ff;
        }
        
        .modal-contenido h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-grupo {
            margin-bottom: 15px;
        }
        
        .form-grupo label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #00ff88;
        }
        
        .form-grupo select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #2d3748;
            background: #16213e;
            color: white;
            font-size: 1rem;
        }
        
        .form-grupo select:focus {
            border-color: #00d4ff;
            outline: none;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .btn-guardar {
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            color: #1a1a2e;
        }
        
        .btn-cancelar {
            background: #e74c3c;
            color: white;
        }
        
        .btn-whatsapp {
            background: #25d366;
            color: white;
        }
        
        .btn-excel {
            background: #217346;
            color: white;
        }
        
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        
        .guardias-registradas {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #2d3748;
        }
        
        .guardia-item {
            background: #2d3748;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .guardia-info {
            flex: 1;
        }
        
        .guardia-turno {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 10px;
        }
        
        .guardia-turno.tarde {
            background: #ff6b35;
        }
        
        .guardia-turno.noche {
            background: #4a00e0;
        }
        
        .btn-eliminar {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .acciones-globales {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .acciones-globales .btn {
            width: auto;
            padding: 12px 20px;
            margin: 0;
        }
        
        .leyenda {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .leyenda-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
        }
        
        .leyenda-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .leyenda-color.tarde {
            background: #ff6b35;
        }
        
        .leyenda-color.noche {
            background: #4a00e0;
        }

        @media (max-width: 600px) {
            .dia {
                min-height: 55px;
                padding: 5px;
            }
            
            .dia-numero {
                font-size: 0.9rem;
            }
            
            .indicador {
                font-size: 0.5rem;
            }
            
            .dia-header {
                font-size: 0.7rem;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Sistema de Guardias 2025</h1>
        
        <div class="nav-mes">
            <button onclick="cambiarMes(-1)">◀ Anterior</button>
            <span class="mes-actual" id="mesActual">Abril 2025</span>
            <button onclick="cambiarMes(1)">Siguiente ▶</button>
        </div>
        
        <div class="leyenda">
            <div class="leyenda-item">
                <div class="leyenda-color tarde"></div>
                <span>Tarde (18-23)</span>
            </div>
            <div class="leyenda-item">
                <div class="leyenda-color noche"></div>
                <span>Noche (23-07)</span>
            </div>
        </div>
        
        <div class="calendario" id="calendario"></div>
        
        <div class="acciones-globales">
            <button class="btn btn-whatsapp" onclick="enviarWhatsApp()">📱 Enviar Resumen</button>
            <button class="btn btn-excel" onclick="exportarExcel()">📊 Exportar Excel</button>
        </div>
    </div>
    
    <!-- Modal para registrar guardia -->
    <div class="modal" id="modal">
        <div class="modal-contenido">
            <h2 id="modalTitulo">Registrar Guardia</h2>
            
            <div class="form-grupo">
                <label>👤 Socio:</label>
                <select id="selectSocio">
                    <option value="">Seleccionar socio...</option>
                </select>
            </div>
            
            <div class="form-grupo">
                <label>⏰ Turno:</label>
                <select id="selectTurno">
                    <option value="">Seleccionar turno...</option>
                    <option value="tarde">🌅 Tarde (18:00 - 23:00)</option>
                    <option value="noche">🌙 Noche (23:00 - 07:00)</option>
                </select>
            </div>
            
            <button class="btn btn-guardar" onclick="guardarGuardia()">✅ Guardar Guardia</button>
            <button class="btn btn-cancelar" onclick="cerrarModal()">❌ Cancelar</button>
            
            <div class="guardias-registradas" id="guardiasRegistradas"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // Lista de socios actualizada
        const SOCIOS = [
            { id: 215, nombre: "Mary Yacqueline Cunha Gómez" },
            { id: 222, nombre: "Mariana Gissel Arias D'ottone" },
            { id: 223, nombre: "Claudia Erika Peña Mármol" },
            { id: 225, nombre: "Stephanie Arias" },
            { id: 228, nombre: "Eduardo Sequeira" },
            { id: 230, nombre: "Alejandra Cabrera" },
            { id: 236, nombre: "Jorge Almada" },
            { id: 237, nombre: "Gonzalo Correa" },
            { id: 238, nombre: "Pablo Mercadal" },
            { id: 239, nombre: "Verónica Echevarría" },
            { id: 240, nombre: "Andrea Curbelo" },
            { id: 241, nombre: "Washington Villar" },
            { id: 242, nombre: "Sabrina Aguilar" },
            { id: 243, nombre: "Soraya Buelmo" },
            { id: 244, nombre: "Marlon Goes" },
            { id: 245, nombre: "Virginia Diaz" },
            { id: 246, nombre: "Oscar Ibarra" },
            { id: 247, nombre: "Claudia Sequeira" },
            { id: 248, nombre: "Claudia Buelmo" },
            { id: 249, nombre: "Mayra Buelmo" },
            { id: 251, nombre: "Adriana Menéndez" },
            { id: 253, nombre: "Juan Pablo Gallulo" },
            { id: 254, nombre: "Belén González" },
            { id: 256, nombre: "Francesca Delgado" },
            { id: 257, nombre: "Juan Rosa" },
            { id: 258, nombre: "Florencia Muñoz" },
            { id: 259, nombre: "Jorge Coímbra" },
            { id: 261, nombre: "Roberto Martínez" },
            { id: 262, nombre: "Katherine Cheda" },
            { id: 265, nombre: "Kevin Guaraglia" },
            { id: 266, nombre: "María Noel Carbajal" },
            { id: 267, nombre: "Martin Salfibia" },
            { id: 268, nombre: "Maximiliano Cisnero" },
            { id: 269, nombre: "Claudia Rios" }
        ];

        const MESES = [
            { nombre: "Abril", mes: 3, anio: 2025 },
            { nombre: "Mayo", mes: 4, anio: 2025 },
            { nombre: "Junio", mes: 5, anio: 2025 },
            { nombre: "Julio", mes: 6, anio: 2025 },
            { nombre: "Agosto", mes: 7, anio: 2025 },
            { nombre: "Septiembre", mes: 8, anio: 2025 },
            { nombre: "Octubre", mes: 9, anio: 2025 },
            { nombre: "Noviembre", mes: 10, anio: 2025 },
            { nombre: "Diciembre", mes: 11, anio: 2025 }
        ];

        const DIAS_SEMANA = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];

        let mesActualIndex = 0;
        let diaSeleccionado = null;
        let guardias = {};

        // Cargar guardias del localStorage
        function cargarGuardias() {
            const guardado = localStorage.getItem('guardias2025');
            if (guardado) {
                guardias = JSON.parse(guardado);
            }
        }

        // Guardar guardias en localStorage
        function guardarGuardiasStorage() {
            localStorage.setItem('guardias2025', JSON.stringify(guardias));
        }

        // Inicializar select de socios
        function inicializarSelectSocios() {
            const select = document.getElementById('selectSocio');
            select.innerHTML = '<option value="">Seleccionar socio...</option>';
            SOCIOS.forEach(socio => {
                const option = document.createElement('option');
                option.value = socio.id;
                option.textContent = `${socio.id} - ${socio.nombre}`;
                select.appendChild(option);
            });
        }

        // Renderizar calendario
        function renderizarCalendario() {
            const mesInfo = MESES[mesActualIndex];
            document.getElementById('mesActual').textContent = `${mesInfo.nombre} ${mesInfo.anio}`;
            
            const calendario = document.getElementById('calendario');
            calendario.innerHTML = '';
            
            // Headers de días
            DIAS_SEMANA.forEach(dia => {
                const header = document.createElement('div');
                header.className = 'dia-header';
                header.textContent = dia;
                calendario.appendChild(header);
            });
            
            const primerDia = new Date(mesInfo.anio, mesInfo.mes, 1);
            const ultimoDia = new Date(mesInfo.anio, mesInfo.mes + 1, 0);
            const diasEnMes = ultimoDia.getDate();
            const primerDiaSemana = primerDia.getDay();
            
            // Días vacíos al inicio
            for (let i = 0; i < primerDiaSemana; i++) {
                const diaVacio = document.createElement('div');
                diaVacio.className = 'dia vacio';
                calendario.appendChild(diaVacio);
            }
            
            // Días del mes
            for (let dia = 1; dia <= diasEnMes; dia++) {
                const diaElement = document.createElement('div');
                diaElement.className = 'dia';
                
                const fechaKey = `${mesInfo.anio}-${String(mesInfo.mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const guardiasDelDia = guardias[fechaKey] || [];
                
                if (guardiasDelDia.length > 0) {
                    diaElement.classList.add('tiene-guardia');
                }
                
                let indicadoresHTML = '<div class="indicadores">';
                const tardeCant = guardiasDelDia.filter(g => g.turno === 'tarde').length;
                const nocheCant = guardiasDelDia.filter(g => g.turno === 'noche').length;
                
                if (tardeCant > 0) {
                    indicadoresHTML += `<span class="indicador tarde">T: ${tardeCant}</span>`;
                }
                if (nocheCant > 0) {
                    indicadoresHTML += `<span class="indicador noche">N: ${nocheCant}</span>`;
                }
                indicadoresHTML += '</div>';
                
                diaElement.innerHTML = `
                    <div class="dia-numero">${dia}</div>
                    ${indicadoresHTML}
                `;
                
                // Eventos táctiles y click
                diaElement.addEventListener('click', (e) => {
                    e.preventDefault();
                    abrirModal(fechaKey, dia, mesInfo.nombre);
                });
                
                calendario.appendChild(diaElement);
            }
        }

        // Cambiar mes
        function cambiarMes(direccion) {
            mesActualIndex += direccion;
            if (mesActualIndex < 0) mesActualIndex = 0;
            if (mesActualIndex >= MESES.length) mesActualIndex = MESES.length - 1;
            renderizarCalendario();
        }

        // Abrir modal
        function abrirModal(fechaKey, dia, mes) {
            diaSeleccionado = fechaKey;
            document.getElementById('modalTitulo').textContent = `📅 ${dia} de ${mes}`;
            document.getElementById('selectSocio').value = '';
            document.getElementById('selectTurno').value = '';
            document.getElementById('modal').classList.add('activo');
            mostrarGuardiasDelDia();
        }

        // Cerrar modal
        function cerrarModal() {
            document.getElementById('modal').classList.remove('activo');
            diaSeleccionado = null;
        }

        // Mostrar guardias del día
        function mostrarGuardiasDelDia() {
            const container = document.getElementById('guardiasRegistradas');
            const guardiasDelDia = guardias[diaSeleccionado] || [];
            
            if (guardiasDelDia.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #888;">No hay guardias registradas</p>';
                return;
            }
            
            let html = '<h3 style="margin-bottom: 10px; color: #00ff88;">Guardias del día:</h3>';
            guardiasDelDia.forEach((guardia, index) => {
                const socio = SOCIOS.find(s => s.id == guardia.socioId);
                html += `
                    <div class="guardia-item">
                        <div class="guardia-info">
                            <strong>${socio ? socio.nombre : 'Desconocido'}</strong>
                            <span class="guardia-turno ${guardia.turno}">${guardia.turno === 'tarde' ? '🌅 Tarde' : '🌙 Noche'}</span>
                        </div>
                        <button class="btn-eliminar" onclick="eliminarGuardia(${index})">🗑️</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Guardar guardia
        function guardarGuardia() {
            const socioId = document.getElementById('selectSocio').value;
            const turno = document.getElementById('selectTurno').value;
            
            if (!socioId || !turno) {
                alert('Por favor seleccioná socio y turno');
                return;
            }
            
            if (!guardias[diaSeleccionado]) {
                guardias[diaSeleccionado] = [];
            }
            
            // Verificar si ya existe
            const existe = guardias[diaSeleccionado].find(
                g => g.socioId == socioId && g.turno == turno
            );
            
            if (existe) {
                alert('Este socio ya tiene este turno asignado en este día');
                return;
            }
            
            guardias[diaSeleccionado].push({
                socioId: socioId,
                turno: turno,
                fecha: diaSeleccionado
            });
            
            guardarGuardiasStorage();
            renderizarCalendario();
            mostrarGuardiasDelDia();
            
            document.getElementById('selectSocio').value = '';
            document.getElementById('selectTurno').value = '';
        }

        // Eliminar guardia
        function eliminarGuardia(index) {
            if (confirm('¿Eliminar esta guardia?')) {
                guardias[diaSeleccionado].splice(index, 1);
                if (guardias[diaSeleccionado].length === 0) {
                    delete guardias[diaSeleccionado];
                }
                guardarGuardiasStorage();
                renderizarCalendario();
                mostrarGuardiasDelDia();
            }
        }

        // Enviar WhatsApp
        function enviarWhatsApp() {
            const mesInfo = MESES[mesActualIndex];
            let mensaje = `🛡️ *GUARDIAS ${mesInfo.nombre.toUpperCase()} ${mesInfo.anio}*\n\n`;
            
            const fechasDelMes = Object.keys(guardias)
                .filter(fecha => {
                    const [anio, mes] = fecha.split('-');
                    return parseInt(anio) === mesInfo.anio && parseInt(mes) === mesInfo.mes + 1;
                })
                .sort();
            
            if (fechasDelMes.length === 0) {
                alert('No hay guardias registradas en este mes');
                return;
            }
            
            fechasDelMes.forEach(fecha => {
                const [anio, mes, dia] = fecha.split('-');
                mensaje += `📅 *${dia}/${mes}*\n`;
                
                guardias[fecha].forEach(g => {
                    const socio = SOCIOS.find(s => s.id == g.socioId);
                    const turnoEmoji = g.turno === 'tarde' ? '🌅' : '🌙';
                    mensaje += `  ${turnoEmoji} ${socio ? socio.nombre : 'Desconocido'}\n`;
                });
                mensaje += '\n';
            });
            
            const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        // Exportar Excel
        function exportarExcel() {
            const datos = [];
            
            Object.keys(guardias).sort().forEach(fecha => {
                guardias[fecha].forEach(g => {
                    const socio = SOCIOS.find(s => s.id == g.socioId);
                    datos.push({
                        'Fecha': fecha,
                        'ID Socio': g.socioId,
                        'Nombre': socio ? socio.nombre : 'Desconocido',
                        'Turno': g.turno === 'tarde' ? 'Tarde (18-23)' : 'Noche (23-07)'
                    });
                });
            });
            
            if (datos.length === 0) {
                alert('No hay guardias para exportar');
                return;
            }
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(datos);
            XLSX.utils.book_append_sheet(wb, ws, 'Guardias');
            XLSX.writeFile(wb, 'guardias_2025.xlsx');
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                cerrarModal();
            }
        });

        // Inicializar
        cargarGuardias();
        inicializarSelectSocios();
        renderizarCalendario();
    </script>
</body>
</html>
