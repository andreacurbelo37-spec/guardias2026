<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardias 2026-2027</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        select {
            background: white;
            color: #333;
            min-width: 200px;
        }
        .btn-export {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            font-weight: bold;
        }
        .btn-reset {
            background: linear-gradient(135deg, #d63031, #e17055);
            color: white;
            font-weight: bold;
        }
        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            font-weight: bold;
        }
        .month-container {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .month-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .day-header {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            font-size: 0.8rem;
        }
        .day-cell {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
            min-height: 100px;
            font-size: 0.75rem;
        }
        .day-cell.empty {
            background: transparent;
        }
        .day-number {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1rem;
        }
        .shift {
            margin: 3px 0;
            padding: 4px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        .shift-tarde {
            background: rgba(253, 203, 110, 0.9);
            color: #333;
        }
        .shift-noche {
            background: rgba(108, 92, 231, 0.9);
            color: white;
        }
        .shift select {
            width: 100%;
            padding: 2px;
            font-size: 0.65rem;
            margin-top: 2px;
            border-radius: 3px;
        }
        .shift-label {
            font-weight: bold;
            font-size: 0.65rem;
        }
        .stats {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stats h3 {
            margin-bottom: 15px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 600px) {
            .calendar-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .day-header {
                display: none;
            }
            .day-cell {
                min-height: 120px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Sistema de Guardias 2026-2027</h1>
        <p class="subtitle">COVISUEL - Registro de turnos</p>
        
        <div class="filters">
            <select id="yearFilter">
                <option value="all">Todos los años</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
            <select id="monthFilter">
                <option value="all">Todos los meses</option>
            </select>
            <button class="btn-export" onclick="exportCSV()">📊 Exportar CSV</button>
            <button class="btn-whatsapp" onclick="shareWhatsApp()">📱 WhatsApp</button>
            <button class="btn-reset" onclick="resetAll()">🗑️ Borrar todo</button>
        </div>

        <div class="stats">
            <h3>📊 Resumen de Guardias</h3>
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <div id="calendar"></div>
    </div>

    <script>
        const socios = [
            { id: "215", nombre: "Mary Yacqueline Cunha Gómez" },
            { id: "222", nombre: "Mariana Gissel Arias D'ottone" },
            { id: "223", nombre: "Claudia Erika Peña Mármol" },
            { id: "225", nombre: "Stephanie Arias" },
            { id: "228", nombre: "Eduardo Sequeira" },
            { id: "230", nombre: "Alejandra Cabrera" },
            { id: "236", nombre: "Jorge Almada" },
            { id: "237", nombre: "Gonzalo Correa" },
            { id: "238", nombre: "Pablo Mercadal" },
            { id: "239", nombre: "Verónica Echevarría" },
            { id: "240", nombre: "Andrea Curbelo" },
            { id: "241", nombre: "Washington Villar" },
            { id: "242", nombre: "Sabrina Aguilar" },
            { id: "243", nombre: "Soraya Buelmo" },
            { id: "244", nombre: "Marlon Goes" },
            { id: "245", nombre: "Virginia Diaz" },
            { id: "246", nombre: "Oscar Ibarra" },
            { id: "247", nombre: "Claudia Sequeira" },
            { id: "248", nombre: "Claudia Buelmo" },
            { id: "249", nombre: "Mayra Buelmo" },
            { id: "251", nombre: "Adriana Menéndez" },
            { id: "253", nombre: "Juan Pablo Gallulo" },
            { id: "254", nombre: "Belén González" },
            { id: "256", nombre: "Francesca Delgado" },
            { id: "257", nombre: "Juan Rosa" },
            { id: "258", nombre: "Florencia Muñoz" },
            { id: "259", nombre: "Jorge Coímbra" },
            { id: "261", nombre: "Roberto Martínez" },
            { id: "262", nombre: "Katherine Cheda" },
            { id: "265", nombre: "Kevin Guaraglia" },
            { id: "266", nombre: "María Noel Carbajal" },
            { id: "267", nombre: "Martin Salfibia" },
            { id: "268", nombre: "Maximiliano Cisnero" },
            { id: "269", nombre: "Claudia Rios" }
        ];

        // Meses del sistema
        const mesesSistema = [
            { year: 2026, month: 4, nombre: "Abril 2026" },
            { year: 2026, month: 5, nombre: "Mayo 2026" },
            { year: 2026, month: 6, nombre: "Junio 2026" },
            { year: 2026, month: 7, nombre: "Julio 2026" },
            { year: 2026, month: 8, nombre: "Agosto 2026" },
            { year: 2026, month: 9, nombre: "Septiembre 2026" },
            { year: 2026, month: 10, nombre: "Octubre 2026" },
            { year: 2026, month: 11, nombre: "Noviembre 2026" },
            { year: 2026, month: 12, nombre: "Diciembre 2026" },
            { year: 2027, month: 1, nombre: "Enero 2027" },
            { year: 2027, month: 2, nombre: "Febrero 2027" },
            { year: 2027, month: 3, nombre: "Marzo 2027" },
            { year: 2027, month: 4, nombre: "Abril 2027" },
            { year: 2027, month: 5, nombre: "Mayo 2027" },
            { year: 2027, month: 6, nombre: "Junio 2027" },
            { year: 2027, month: 7, nombre: "Julio 2027" },
            { year: 2027, month: 8, nombre: "Agosto 2027" },
            { year: 2027, month: 9, nombre: "Septiembre 2027" },
            { year: 2027, month: 10, nombre: "Octubre 2027" },
            { year: 2027, month: 11, nombre: "Noviembre 2027" },
            { year: 2027, month: 12, nombre: "Diciembre 2027" }
        ];

        const STORAGE_KEY = 'guardias2026_2027';
        let guardias = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

        function saveGuardias() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(guardias));
            updateStats();
        }

        function getGuardia(year, month, day, turno) {
            const key = `${year}-${month}-${day}-${turno}`;
            return guardias[key] || '';
        }

        function setGuardia(year, month, day, turno, socioId) {
            const key = `${year}-${month}-${day}-${turno}`;
            if (socioId) {
                guardias[key] = socioId;
            } else {
                delete guardias[key];
            }
            saveGuardias();
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            let day = new Date(year, month - 1, 1).getDay();
            return day === 0 ? 6 : day - 1;
        }

        function createSocioSelect(year, month, day, turno) {
            const currentValue = getGuardia(year, month, day, turno);
            let html = `<select onchange="setGuardia(${year}, ${month}, ${day}, '${turno}', this.value)">`;
            html += `<option value="">-- Seleccionar --</option>`;
            socios.forEach(s => {
                const selected = currentValue === s.id ? 'selected' : '';
                html += `<option value="${s.id}" ${selected}>${s.id} - ${s.nombre.split(' ')[0]}</option>`;
            });
            html += '</select>';
            return html;
        }

        function renderMonth(year, month, nombre) {
            const days = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            
            let html = `<div class="month-container">
                <h2 class="month-title">📅 ${nombre}</h2>
                <div class="calendar-grid">
                    <div class="day-header">Lun</div>
                    <div class="day-header">Mar</div>
                    <div class="day-header">Mié</div>
                    <div class="day-header">Jue</div>
                    <div class="day-header">Vie</div>
                    <div class="day-header">Sáb</div>
                    <div class="day-header">Dom</div>`;
            
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="day-cell empty"></div>`;
            }
            
            for (let day = 1; day <= days; day++) {
                html += `<div class="day-cell">
                    <div class="day-number">${day}</div>
                    <div class="shift shift-tarde">
                        <span class="shift-label">🌅 Tarde</span>
                        ${createSocioSelect(year, month, day, 'tarde')}
                    </div>
                    <div class="shift shift-noche">
                        <span class="shift-label">🌙 Noche</span>
                        ${createSocioSelect(year, month, day, 'noche')}
                    </div>
                </div>`;
            }
            
            html += '</div></div>';
            return html;
        }

        function renderCalendar() {
            const yearFilter = document.getElementById('yearFilter').value;
            const monthFilter = document.getElementById('monthFilter').value;
            
            let html = '';
            mesesSistema.forEach(m => {
                if (yearFilter !== 'all' && m.year !== parseInt(yearFilter)) return;
                if (monthFilter !== 'all' && `${m.year}-${m.month}` !== monthFilter) return;
                html += renderMonth(m.year, m.month, m.nombre);
            });
            
            document.getElementById('calendar').innerHTML = html;
        }

        function populateMonthFilter() {
            const select = document.getElementById('monthFilter');
            mesesSistema.forEach(m => {
                const option = document.createElement('option');
                option.value = `${m.year}-${m.month}`;
                option.textContent = m.nombre;
                select.appendChild(option);
            });
        }

        function updateStats() {
            const stats = {};
            socios.forEach(s => stats[s.id] = { nombre: s.nombre, tarde: 0, noche: 0 });
            
            Object.entries(guardias).forEach(([key, socioId]) => {
                if (stats[socioId]) {
                    const turno = key.split('-')[3];
                    stats[socioId][turno]++;
                }
            });
            
            let html = '';
            Object.entries(stats).forEach(([id, data]) => {
                const total = data.tarde + data.noche;
                if (total > 0) {
                    html += `<div class="stat-item">
                        <span>${id} - ${data.nombre.split(' ')[0]}</span>
                        <span>T:${data.tarde} N:${data.noche} = ${total}</span>
                    </div>`;
                }
            });
            
            document.getElementById('statsGrid').innerHTML = html || '<p>No hay guardias asignadas</p>';
        }

        function exportCSV() {
            let csv = 'Fecha,Turno,ID Socio,Nombre\n';
            Object.entries(guardias).sort().forEach(([key, socioId]) => {
                const [year, month, day, turno] = key.split('-');
                const socio = socios.find(s => s.id === socioId);
                csv += `${day}/${month}/${year},${turno},${socioId},"${socio?.nombre || ''}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'guardias_2026_2027.csv';
            a.click();
        }

        function shareWhatsApp() {
            let msg = '📋 *GUARDIAS COVISUEL 2026-2027*\n\n';
            const grouped = {};
            
            Object.entries(guardias).sort().forEach(([key, socioId]) => {
                const [year, month, day, turno] = key.split('-');
                const fecha = `${day}/${month}/${year}`;
                if (!grouped[fecha]) grouped[fecha] = {};
                const socio = socios.find(s => s.id === socioId);
                grouped[fecha][turno] = `${socioId} - ${socio?.nombre.split(' ')[0] || ''}`;
            });
            
            Object.entries(grouped).slice(0, 15).forEach(([fecha, turnos]) => {
                msg += `📅 ${fecha}\n`;
                if (turnos.tarde) msg += `🌅 Tarde: ${turnos.tarde}\n`;
                if (turnos.noche) msg += `🌙 Noche: ${turnos.noche}\n`;
                msg += '\n';
            });
            
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        function resetAll() {
            if (confirm('⚠️ ¿Borrar TODAS las guardias de 2026 y 2027?')) {
                guardias = {};
                saveGuardias();
                renderCalendar();
            }
        }

        document.getElementById('yearFilter').addEventListener('change', renderCalendar);
        document.getElementById('monthFilter').addEventListener('change', renderCalendar);

        // Inicializar
        populateMonthFilter();
        renderCalendar();
        updateStats();
    </script>
</body>
</html>
