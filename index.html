<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COVISUEL - Sistema de Guardias 2026-2027</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .header img {
            max-width: 120px;
            height: auto;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.8;
        }
        
        /* Selector de socio */
        .socio-selector {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .socio-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .socio-selector select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            background: #fff;
            color: #333;
        }
        
        /* Info del socio */
        .socio-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .socio-info.active {
            display: block;
        }
        
        .socio-info h3 {
            margin-bottom: 10px;
        }
        
        .limites {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .limite-item {
            background: rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        /* Navegación del calendario */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .calendar-nav button {
            background: #667eea;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .calendar-nav button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        .calendar-nav button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }
        
        .month-title {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        /* Calendario */
        .calendar {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: rgba(102, 126, 234, 0.5);
        }
        
        .calendar-header div {
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        
        .calendar-day {
            aspect-ratio: 1;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-height: 80px;
        }
        
        .calendar-day:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .calendar-day.empty {
            background: transparent;
            cursor: default;
        }
        
        .calendar-day.past {
            background: rgba(255,255,255,0.05);
            opacity: 0.6;
            cursor: pointer;
        }
        
        .calendar-day .day-number {
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .calendar-day .shifts {
            margin-top: 5px;
            font-size: 0.7rem;
        }
        
        .shift-indicator {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 2px;
            font-weight: bold;
        }
        
        .shift-tarde {
            background: #f39c12;
            color: #000;
        }
        
        .shift-noche {
            background: #3498db;
            color: #fff;
        }
        
        .shift-full {
            background: #e74c3c;
        }
        
        /* Leyenda */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            font-size: 1.5rem;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
        }
        
        /* Turnos en el modal */
        .shift-section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        
        .shift-section h3 {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .shift-section h3 .icon {
            font-size: 1.5rem;
        }
        
        .registered-list {
            margin-bottom: 15px;
        }
        
        .registered-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .registered-item .socio-name {
            font-weight: bold;
        }
        
        .registered-item .socio-id {
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        .spots-available {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-tarde {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #000;
        }
        
        .btn-noche {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
        }
        
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: #fff;
            margin-top: 15px;
        }
        
        /* Admin Panel */
        .admin-section {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        
        .admin-section h3 {
            margin-bottom: 15px;
        }
        
        .admin-login {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .admin-login input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }
        
        .admin-controls {
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .admin-controls.active {
            display: flex;
        }
        
        .admin-controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: #fff;
        }
        
        .btn-export {
            background: #27ae60;
            color: #fff;
        }
        
        .btn-compliance {
            background: #9b59b6;
            color: #fff;
        }
        
        /* Status messages */
        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        
        .status-message.success {
            background: rgba(39, 174, 96, 0.3);
            border: 1px solid #27ae60;
            display: block;
        }
        
        .status-message.error {
            background: rgba(231, 76, 60, 0.3);
            border: 1px solid #e74c3c;
            display: block;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .calendar-day {
                min-height: 60px;
                padding: 5px;
            }
            
            .calendar-day .day-number {
                font-size: 0.9rem;
            }
            
            .calendar-day .shifts {
                font-size: 0.6rem;
            }
            
            .shift-indicator {
                padding: 1px 4px;
            }
            
            .calendar-header div {
                padding: 10px 5px;
                font-size: 0.8rem;
            }
            
            .month-title {
                font-size: 1.2rem;
            }
        }
        
        /* Modal de cumplimiento */
        .compliance-modal .modal-content {
            max-width: 700px;
        }
        
        .compliance-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .compliance-table th,
        .compliance-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .compliance-table th {
            background: rgba(102, 126, 234, 0.3);
        }
        
        .compliance-ok {
            color: #2ecc71;
        }
        
        .compliance-pending {
            color: #f39c12;
        }
        
        .compliance-missing {
            color: #e74c3c;
        }
    </style>
</head>
<body>

    <!-- Modal de Día -->

                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div id="modal-body">
                <!-- Contenido dinámico -->
            </div>
            
            <button class="btn btn-whatsapp" onclick="shareDayWhatsApp()">
                📱 Compartir día por WhatsApp
            </button>
            
            <div class="status-message" id="status-message"></div>
        </div>
    </div>
    
    <!-- Modal de Cumplimiento -->
    <div class="modal compliance-modal" id="compliance-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 Cumplimiento Mensual</h2>
                <button class="close-btn" onclick="closeComplianceModal()">&times;</button>
            </div>
            
            <div id="compliance-body">
                <!-- Tabla de cumplimiento -->
            </div>
        </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const CONFIG = {
            API_URL: 'https://script.google.com/macros/s/AKfycbzZ3zh0iGXbSbhoYe0Vj4iKLKNdkxCc-Ycd8NmMuRs_sX24veE6/exec',
            ADMIN_PASSWORD: 'Molas2026',
            ADMIN_IDS: [240, 245, 253, 266],
            MAX_PER_SHIFT: 3,
            MAX_TARDE_MES: 2,
            MAX_NOCHE_MES: 3,
            START_DATE: new Date(2026, 3, 1), // Abril 2026
            END_DATE: new Date(2027, 11, 31)  // Diciembre 2027
        };

        // Lista de socios CORREGIDA
        const SOCIOS = [
            { id: 215, nombre: "Mary Yacqueline Cunha Gómez" },
            { id: 222, nombre: "Mariana Gissel Arias D'ottone" },
            { id: 223, nombre: "Claudia Erika Peña Mármol" },
            { id: 225, nombre: "Stephanie Arias" },
            { id: 228, nombre: "Eduardo Sequeira" },
            { id: 230, nombre: "Alejandra Cabrera" },
            { id: 236, nombre: "Jorge Almada" },
            { id: 237, nombre: "Gonzalo Correa" },
            { id: 238, nombre: "Pablo Mercadal" },
            { id: 239, nombre: "Verónica Echevarría" },
            { id: 240, nombre: "Andrea Curbelo" },
            { id: 241, nombre: "Washington Villar" },
            { id: 242, nombre: "Sabrina Aguilar" },
            { id: 243, nombre: "Soraya Buelmo" },
            { id: 244, nombre: "Marlon Goes" },
            { id: 245, nombre: "Virginia Diaz" },
            { id: 246, nombre: "Oscar Ibarra" },
            { id: 247, nombre: "Claudia Sequeira" },
            { id: 248, nombre: "Claudia Buelmo" },
            { id: 249, nombre: "Mayra Buelmo" },
            { id: 251, nombre: "Adriana Menéndez" },
            { id: 253, nombre: "Juan Pablo Gallulo" },
            { id: 254, nombre: "Belén González" },
            { id: 256, nombre: "Francesca Delgado" },
            { id: 257, nombre: "Juan Rosa" },
            { id: 258, nombre: "Florencia Muñoz" },
            { id: 259, nombre: "Jorge Coímbra" },
            { id: 261, nombre: "Roberto Martínez" },
            { id: 262, nombre: "Katherine Cheda" },
            { id: 265, nombre: "Kevin Guaraglia" },
            { id: 266, nombre: "María Noel Carbajal" },
            { id: 267, nombre: "Martin Salfibia" },
            { id: 268, nombre: "Maximiliano Cisnero" },
            { id: 269, nombre: "Claudia Rios" }
        ];

        // ============================================
        // ESTADO DE LA APLICACIÓN
        // ============================================
        let currentDate = new Date(2026, 3, 1); // Abril 2026
        let selectedSocio = null;
        let guardias = [];
        let isAdmin = false;
        let selectedDay = null;

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            initSocioSelector();
            renderCalendar();
            loadGuardias();
            
            document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
            document.getElementById('next-month').addEventListener('click', () => changeMonth(1));
        });

        function initSocioSelector() {
            const select = document.getElementById('socio-select');
            SOCIOS.forEach(socio => {
                const option = document.createElement('option');
                option.value = socio.id;
                option.textContent = `${socio.id} - ${socio.nombre}`;
                select.appendChild(option);
            });
            
            select.addEventListener('change', function() {
                if (this.value) {
                    selectedSocio = SOCIOS.find(s => s.id == this.value);
                    document.getElementById('socio-info').classList.add('active');
                    document.getElementById('socio-nombre').textContent = 
                        `${selectedSocio.id} - ${selectedSocio.nombre}`;
                    updateSocioLimits();
                } else {
                    selectedSocio = null;
                    document.getElementById('socio-info').classList.remove('active');
                }
            });
        }

        // ============================================
        // CALENDARIO
        // ============================================
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Título del mes
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                              'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            document.getElementById('month-title').textContent = `${monthNames[month]} ${year}`;
            
            // Primer día del mes
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startingDay = firstDay.getDay();
            
            // Días vacíos al inicio
            for (let i = 0; i < startingDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                grid.appendChild(emptyDay);
            }
            
            // Días del mes
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                
                const dateStr = formatDate(year, month, day);
                const dayDate = new Date(year, month, day);
                
                // Verificar si es día pasado
                if (dayDate < today) {
                    dayElement.classList.add('past');
                }
                
                dayElement.innerHTML = `
                    <div class="day-number">${day}</div>
                    <div class="shifts" id="shifts-${dateStr}"></div>
                `;
                
                dayElement.addEventListener('click', () => openDayModal(year, month, day));
                grid.appendChild(dayElement);
            }
            
            updateCalendarShifts();
            updateNavButtons();
        }

        function updateCalendarShifts() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const lastDay = new Date(year, month + 1, 0).getDate();
            
            for (let day = 1; day <= lastDay; day++) {
                const dateStr = formatDate(year, month, day);
                const shiftsContainer = document.getElementById(`shifts-${dateStr}`);
                
                if (shiftsContainer) {
                    const dayGuardias = guardias.filter(g => g.fecha === dateStr);
                    const tardeCount = dayGuardias.filter(g => g.turno === 'Tarde').length;
                    const nocheCount = dayGuardias.filter(g => g.turno === 'Noche').length;
                    
                    let shiftsHTML = '';
                    
                    if (tardeCount > 0) {
                        const tardeClass = tardeCount >= CONFIG.MAX_PER_SHIFT ? 'shift-tarde shift-full' : 'shift-tarde';
                        shiftsHTML += `<span class="shift-indicator ${tardeClass}">T:${tardeCount}</span>`;
                    }
                    
                    if (nocheCount > 0) {
                        const nocheClass = nocheCount >= CONFIG.MAX_PER_SHIFT ? 'shift-noche shift-full' : 'shift-noche';
                        shiftsHTML += `<span class="shift-indicator ${nocheClass}">N:${nocheCount}</span>`;
                    }
                    
                    shiftsContainer.innerHTML = shiftsHTML;
                }
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
            loadGuardias();
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prev-month');
            const nextBtn = document.getElementById('next-month');
            
            // Límite inferior: Abril 2026
            const minDate = new Date(2026, 3, 1);
            prevBtn.disabled = currentDate <= minDate;
            
            // Límite superior: Diciembre 2027
            const maxDate = new Date(2027, 11, 1);
            nextBtn.disabled = currentDate >= maxDate;
        }

        // ============================================
        // MODAL DE DÍA
        // ============================================
        function openDayModal(year, month, day) {
            selectedDay = { year, month, day };
            const dateStr = formatDate(year, month, day);
            const dayDate = new Date(year, month, day);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const isPast = dayDate < today;
            
            // Formato de fecha para mostrar
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('modal-date').textContent = dayDate.toLocaleDateString('es-UY', options);
            
            const dayGuardias = guardias.filter(g => g.fecha === dateStr);
            const tardeGuardias = dayGuardias.filter(g => g.turno === 'Tarde');
            const nocheGuardias = dayGuardias.filter(g => g.turno === 'Noche');
            
            const modalBody = document.getElementById('modal-body');
            
            // Verificar si el socio actual ya está registrado
            const socioEnTarde = selectedSocio && tardeGuardias.some(g => g.socioId == selectedSocio.id);
            const socioEnNoche = selectedSocio && nocheGuardias.some(g => g.socioId == selectedSocio.id);
            
            // Verificar límites mensuales
            const limites = selectedSocio ? getSocioMonthlyCount(selectedSocio.id) : { tarde: 0, noche: 0 };
            const puedeTarde = limites.tarde < CONFIG.MAX_TARDE_MES;
            const puedeNoche = limites.noche < CONFIG.MAX_NOCHE_MES;
            
            modalBody.innerHTML = `
                <!-- TURNO TARDE -->
                <div class="shift-section">
                    <h3><span class="icon">☀️</span> Turno Tarde (14:00 - 20:00)</h3>
                    <div class="spots-available">
                        Lugares: ${tardeGuardias.length}/${CONFIG.MAX_PER_SHIFT}
                    </div>
                    <div class="registered-list">
                        ${tardeGuardias.length > 0 ? 
                            tardeGuardias.map(g => `
                                <div class="registered-item">
                                    <div>
                                        <span class="socio-name">${getSocioNombre(g.socioId)}</span>
                                        <span class="socio-id">(${g.socioId})</span>
                                    </div>
                                    ${isAdmin ? `<button class="btn btn-delete" onclick="deleteGuardia('${g.id}')" style="width:auto;padding:5px 10px;">🗑️</button>` : ''}
                                </div>
                            `).join('') 
                            : '<p style="opacity: 0.7;">No hay registros aún</p>'}
                    </div>
                    ${!isPast ? `
                        <button class="btn btn-tarde" 
                            onclick="registrarGuardia('Tarde')"
                            ${!selectedSocio || tardeGuardias.length >= CONFIG.MAX_PER_SHIFT || socioEnTarde || !puedeTarde ? 'disabled' : ''}>
                            ${!selectedSocio ? 'Selecciona un socio primero' :
                              socioEnTarde ? '✓ Ya estás registrado' :
                              !puedeTarde ? 'Límite mensual alcanzado' :
                              tardeGuardias.length >= CONFIG.MAX_PER_SHIFT ? 'Turno completo' :
                              'Registrarme en Tarde'}
                        </button>
                    ` : '<p style="text-align:center; opacity:0.7; margin-top:10px;">📅 Día pasado - Solo lectura</p>'}
                </div>
                
                <!-- TURNO NOCHE -->
                <div class="shift-section">
                    <h3><span class="icon">🌙</span> Turno Noche (20:00 - 00:00)</h3>
                    <div class="spots-available">
                        Lugares: ${nocheGuardias.length}/${CONFIG.MAX_PER_SHIFT}
                    </div>
                    <div class="registered-list">
                        ${nocheGuardias.length > 0 ? 
                            nocheGuardias.map(g => `
                                <div class="registered-item">
                                    <div>
                                        <span class="socio-name">${getSocioNombre(g.socioId)}</span>
                                        <span class="socio-id">(${g.socioId})</span>
                                    </div>
                                    ${isAdmin ? `<button class="btn btn-delete" onclick="deleteGuardia('${g.id}')" style="width:auto;padding:5px 10px;">🗑️</button>` : ''}
                                </div>
                            `).join('')
                            : '<p style="opacity: 0.7;">No hay registros aún</p>'}
                    </div>
                    ${!isPast ? `
                        <button class="btn btn-noche" 
                            onclick="registrarGuardia('Noche')"
                            ${!selectedSocio || nocheGuardias.length >= CONFIG.MAX_PER_SHIFT || socioEnNoche || !puedeNoche ? 'disabled' : ''}>
                            ${!selectedSocio ? 'Selecciona un socio primero' :
                              socioEnNoche ? '✓ Ya estás registrado' :
                              !puedeNoche ? 'Límite mensual alcanzado' :
                              nocheGuardias.length >= CONFIG.MAX_PER_SHIFT ? 'Turno completo' :
                              'Registrarme en Noche'}
                        </button>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('day-modal').classList.add('active');
            document.getElementById('status-message').className = 'status-message';
            document.getElementById('status-message').textContent = '';
        }

        function closeModal() {
            document.getElementById('day-modal').classList.remove('active');
            selectedDay = null;
        }

        // ============================================
        // GESTIÓN DE GUARDIAS
        // ============================================
        async function loadGuardias() {
            try {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth() + 1;
                
                const response = await fetch(`${CONFIG.API_URL}?action=getGuardias&year=${year}&month=${month}`);
                const data = await response.json();
                
                if (data.success) {
                    guardias = data.guardias || [];
                    updateCalendarShifts();
                    updateSocioLimits();
                }
            } catch (error) {
                console.error('Error cargando guardias:', error);
                // Usar datos locales si falla la conexión
            }
        }

        async function registrarGuardia(turno) {
            if (!selectedSocio || !selectedDay) return;
            
            const dateStr = formatDate(selectedDay.year, selectedDay.month, selectedDay.day);
            
            showStatus('Registrando...', 'loading');
            
            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'registrarGuardia',
                        fecha: dateStr,
                        turno: turno,
                        socioId: selectedSocio.id,
                        socioNombre: selectedSocio.nombre
                    })
                });
                
                // Como es no-cors, asumimos éxito y actualizamos localmente
                const newGuardia = {
                    id: Date.now().toString(),
                    fecha: dateStr,
                    turno: turno,
                    socioId: selectedSocio.id,
                    socioNombre: selectedSocio.nombre
                };
                
                guardias.push(newGuardia);
                updateCalendarShifts();
                updateSocioLimits();
                openDayModal(selectedDay.year, selectedDay.month, selectedDay.day);
                
                showStatus('✅ ¡Registrado correctamente!', 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Error al registrar. Intenta de nuevo.', 'error');
            }
        }

        async function deleteGuardia(guardiaId) {
            if (!confirm('¿Seguro que deseas eliminar este registro?')) return;
            
            try {
                await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'eliminarGuardia',
                        guardiaId: guardiaId
                    })
                });
                
                // Actualizar localmente
                guardias = guardias.filter(g => g.id !== guardiaId);
                updateCalendarShifts();
                updateSocioLimits();
                
                if (selectedDay) {
                    openDayModal(selectedDay.year, selectedDay.month, selectedDay.day);
                }
                
                showStatus('✅ Registro eliminado', 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Error al eliminar', 'error');
            }
        }

        // ============================================
        // UTILIDADES
        // ============================================
        function formatDate(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getSocioNombre(socioId) {
            const socio = SOCIOS.find(s => s.id == socioId);
            return socio ? socio.nombre : `Socio ${socioId}`;
        }

        function getSocioMonthlyCount(socioId) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthGuardias = guardias.filter(g => {
                const gDate = new Date(g.fecha);
                return g.socioId == socioId && 
                       gDate.getFullYear() === year && 
                       gDate.getMonth() === month;
            });
            
            return {
                tarde: monthGuardias.filter(g => g.turno === 'Tarde').length,
                noche: monthGuardias.filter(g => g.turno === 'Noche').length
            };
        }

        function updateSocioLimits() {
            if (!selectedSocio) return;
            
            const counts = getSocioMonthlyCount(selectedSocio.id);
            document.getElementById('tardes-count').textContent = `${counts.tarde}/${CONFIG.MAX_TARDE_MES}`;
            document.getElementById('noches-count').textContent = `${counts.noche}/${CONFIG.MAX_NOCHE_MES}`;
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
        }

        // ============================================
        // ADMINISTRACIÓN
        // ============================================
        function loginAdmin() {
            const password = document.getElementById('admin-password').value;
            
            if (password === CONFIG.ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('admin-controls').classList.add('active');
                document.getElementById('admin-password').style.display = 'none';
                document.querySelector('.admin-login .btn').style.display = 'none';
                alert('✅ Acceso de administrador activado');
            } else {
                alert('❌ Contraseña incorrecta');
            }
        }

        function exportToExcel() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                              'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            let csv = 'Fecha,Turno,ID Socio,Nombre Socio\n';
            
            const monthGuardias = guardias.filter(g => {
                const gDate = new Date(g.fecha);
                return gDate.getFullYear() === year && gDate.getMonth() === month;
            }).sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            
            monthGuardias.forEach(g => {
                csv += `${g.fecha},${g.turno},${g.socioId},"${getSocioNombre(g.socioId)}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Guardias_${monthNames[month]}_${year}.csv`;
            link.click();
        }

        function showCompliance() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                              'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            let html = `<h3>📊 ${monthNames[month]} ${year}</h3>`;
            html += `<table class="compliance-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Tarde</th>
                        <th>Noche</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>`;
            
            SOCIOS.forEach(socio => {
                const counts = getSocioMonthlyCount(socio.id);
                const tardeOk = counts.tarde >= CONFIG.MAX_TARDE_MES;
                const nocheOk = counts.noche >= CONFIG.MAX_NOCHE_MES;
                const completo = tardeOk && nocheOk;
                
                let estado = '';
                let estadoClass = '';
                
                if (completo) {
                    estado = '✅ Completo';
                    estadoClass = 'compliance-ok';
                } else if (counts.tarde > 0 || counts.noche > 0) {
                    estado = '⏳ Parcial';
                    estadoClass = 'compliance-pending';
                } else {
                    estado = '❌ Pendiente';
                    estadoClass = 'compliance-missing';
                }
                
                html += `<tr>
                    <td>${socio.id}</td>
                    <td>${socio.nombre}</td>
                    <td>${counts.tarde}/${CONFIG.MAX_TARDE_MES}</td>
                    <td>${counts.noche}/${CONFIG.MAX_NOCHE_MES}</td>
                    <td class="${estadoClass}">${estado}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            
            document.getElementById('compliance-body').innerHTML = html;
            document.getElementById('compliance-modal').classList.add('active');
        }

        function closeComplianceModal() {
            document.getElementById('compliance-modal').classList.remove('active');
        }

        // ============================================
        // WHATSAPP
        // ============================================
        function shareDayWhatsApp() {
            if (!selectedDay) return;
            
            const dateStr = formatDate(selectedDay.year, selectedDay.month, selectedDay.day);
            const dayDate = new Date(selectedDay.year, selectedDay.month, selectedDay.day);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateDisplay = dayDate.toLocaleDateString('es-UY', options);
            
            const dayGuardias = guardias.filter(g => g.fecha === dateStr);
            const tardeGuardias = dayGuardias.filter(g => g.turno === 'Tarde');
            const nocheGuardias = dayGuardias.filter(g => g.turno === 'Noche');
            
            let message = `🛡️ *COVISUEL - Guardias*\n`;
            message += `📅 ${dateDisplay}\n\n`;
            
            message += `☀️ *TARDE (14-20h)*\n`;
            if (tardeGuardias.length > 0) {
                tardeGuardias.forEach(g => {
                    message += `  • ${getSocioNombre(g.socioId)}\n`;
                });
            } else {
                message += `  _Sin registros_\n`;
            }
            message += `  Lugares: ${tardeGuardias.length}/${CONFIG.MAX_PER_SHIFT}\n\n`;
            
            message += `🌙 *NOCHE (20-00h)*\n`;
            if (nocheGuardias.length > 0) {
                nocheGuardias.forEach(g => {
                    message += `  • ${getSocioNombre(g.socioId)}\n`;
                });
            } else {
                message += `  _Sin registros_\n`;
            }
            message += `  Lugares: ${nocheGuardias.length}/${CONFIG.MAX_PER_SHIFT}`;
            
            const whatsappURL = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
        }

        function shareMonthWhatsApp() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                              'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            const monthGuardias = guardias.filter(g => {
                const gDate = new Date(g.fecha);
                return gDate.getFullYear() === year && gDate.getMonth() === month;
            }).sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            
            let message = `🛡️ *COVISUEL - Resumen ${monthNames[month]} ${year}*\n\n`;
            
            const uniqueDates = [...new Set(monthGuardias.map(g => g.fecha))];
            
            uniqueDates.forEach(date => {
                const dayGuardias = monthGuardias.filter(g => g.fecha === date);
                const dateParts = date.split('-');
                const dayNum = parseInt(dateParts[2]);
                
                message += `📅 *${dayNum}/${month + 1}*\n`;
                
                const tarde = dayGuardias.filter(g => g.turno === 'Tarde');
                const noche = dayGuardias.filter(g => g.turno === 'Noche');
                
                if (tarde.length > 0) {
                    message += `☀️ T: ${tarde.map(g => getSocioNombre(g.socioId).split(' ')[0]).join(', ')}\n`;
                }
                if (noche.length > 0) {
                    message += `🌙 N: ${noche.map(g => getSocioNombre(g.socioId).split(' ')[0]).join(', ')}\n`;
                }
                message += `\n`;
            });
            
            message += `📊 Total registros: ${monthGuardias.length}`;
            
            const whatsappURL = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(whatsappURL, '_blank');
        }

        // Cerrar modales con Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeComplianceModal();
            }
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('day-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.getElementById('compliance-modal').addEventListener('click', function(e) {
            if (e.target === this) closeComplianceModal();
        });
    </script>
</body>
</html>
