<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardias COVISUEL 2026-2027</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }

        .logo-container {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 15px;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #2a5298;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-nucleo {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-nucleo:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-colaborador {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-colaborador:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .colaborador-section {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #fff5f5;
            border-radius: 8px;
            border: 2px solid #f5576c;
        }

        .colaborador-section.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-confirmar-colaborador {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            margin-top: 15px;
        }

        .nav-meses {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-meses button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-meses button:hover {
            background: #2a5298;
        }

        .nav-meses span {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e3c72;
            min-width: 200px;
            text-align: center;
        }

        .calendario {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .dia-header {
            background: #1e3c72;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: 600;
            border-radius: 5px;
        }

        .dia {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 10px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .dia:hover {
            border-color: #2a5298;
            transform: scale(1.02);
        }

        .dia.vacio {
            background: transparent;
            cursor: default;
        }

        .dia.vacio:hover {
            border-color: transparent;
            transform: none;
        }

        .dia-numero {
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .dia.verde { background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); }
        .dia.amarillo { background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%); }
        .dia.rojo { background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%); }

        .turno-indicador {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 3px;
            display: inline-block;
        }

        .turno-tarde {
            background: #ffeaa7;
            color: #856404;
        }

        .turno-noche {
            background: #74b9ff;
            color: #0c5460;
        }

        .leyenda {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .leyenda-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .leyenda-color {
            width: 25px;
            height: 25px;
            border-radius: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .guardia-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .guardia-item.colaborador {
            background: #fff0f3;
            border-left: 4px solid #f5576c;
        }

        .btn-eliminar {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        .admin-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
        }

        .admin-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .btn-admin {
            background: #6c757d;
            color: white;
            width: 100%;
        }

        .mensaje {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .mensaje.exito {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        @media (max-width: 768px) {
            .calendario {
                grid-template-columns: repeat(7, 1fr);
                gap: 3px;
            }

            .dia {
                padding: 5px;
                min-height: 70px;
            }

            .dia-numero {
                font-size: 0.9rem;
            }

            .turno-indicador {
                font-size: 0.6rem;
                padding: 1px 3px;
            }

            .btn-group {
                flex-direction: column;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="Covisuel logo para llavero.jpg" alt="Logo COVISUEL">
            </div>
            <h1>🛡️ Sistema de Guardias</h1>
            <p class="subtitle">COVISUEL - Abril 2026 a Diciembre 2027</p>
        </header>

        <div class="panel">
            <h2>📝 Registrar Guardia</h2>
            <div id="mensaje" class="mensaje"></div>
            
            <div class="form-group">
                <label for="socio">👤 Seleccionar Socio:</label>
                <select id="socio">
                    <option value="">-- Seleccione un socio --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="turno">⏰ Seleccionar Turno:</label>
                <select id="turno">
                    <option value="">-- Seleccione un turno --</option>
                    <option value="tarde">🌅 Tarde (18:00 - 23:00)</option>
                    <option value="noche">🌙 Noche (23:00 - 07:00)</option>
                </select>
            </div>

            <div class="btn-group">
                <button class="btn btn-nucleo" onclick="registrarNucleo()">
                    🔵 Soy Núcleo
                </button>
                <button class="btn btn-colaborador" onclick="mostrarColaborador()">
                    🤝 Soy Colaborador
                </button>
            </div>

            <div id="colaboradorSection" class="colaborador-section">
                <div class="form-group">
                    <label for="socioCubierto">¿A qué socio estás cubriendo?</label>
                    <select id="socioCubierto">
                        <option value="">-- Seleccione el socio que cubre --</option>
                    </select>
                </div>
                <button class="btn btn-confirmar-colaborador" onclick="registrarColaborador()">
                    ✅ Confirmar como Colaborador
                </button>
            </div>
        </div>

        <div class="panel">
            <h2>📅 Calendario de Guardias</h2>
            
            <div class="nav-meses">
                <button onclick="cambiarMes(-1)">◀ Anterior</button>
                <span id="mesActual">Abril 2026</span>
                <button onclick="cambiarMes(1)">Siguiente ▶</button>
            </div>

            <div class="calendario" id="calendario">
                <div class="dia-header">Dom</div>
                <div class="dia-header">Lun</div>
                <div class="dia-header">Mar</div>
                <div class="dia-header">Mié</div>
                <div class="dia-header">Jue</div>
                <div class="dia-header">Vie</div>
                <div class="dia-header">Sáb</div>
            </div>

            <div class="leyenda">
                <div class="leyenda-item">
                    <div class="leyenda-color" style="background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);"></div>
                    <span>0-1 guardias</span>
                </div>
                <div class="leyenda-item">
                    <div class="leyenda-color" style="background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);"></div>
                    <span>2-5 guardias</span>
                </div>
                <div class="leyenda-item">
                    <div class="leyenda-color" style="background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);"></div>
                    <span>6 guardias (Completo)</span>
                </div>
            </div>
        </div>

        <div class="panel admin-section">
            <h2>🔐 Acceso Administrador</h2>
            <p style="color: #666; margin-bottom: 15px;">Solo administradores pueden eliminar registros.</p>
            <input type="password" id="adminPassword" placeholder="Contraseña de administrador">
            <button class="btn btn-admin" onclick="verificarAdmin()">Acceder como Administrador</button>
        </div>
    </div>

    <!-- Modal para ver detalles del día -->
    <div class="modal" id="modalDia">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitulo">Guardias del día</h3>
                <button class="modal-close" onclick="cerrarModal()">✕</button>
            </div>
            <div id="modalContenido"></div>
            <button class="btn btn-whatsapp" onclick="compartirWhatsApp()">
                📱 Compartir por WhatsApp
            </button>
        </div>
    </div>

    <script>
        // Lista de socios con sus IDs
        const socios = [
            { id: 215, nombre: "Mary Yacqueline Cunha Gómez" },
            { id: 222, nombre: "Mariana Gissel Arias D'ottone" },
            { id: 223, nombre: "Claudia Erika Peña Mármol" },
            { id: 225, nombre: "Stephanie Arias" },
            { id: 228, nombre: "Eduardo Sequeira" },
            { id: 230, nombre: "Alejandra Cabrera" },
            { id: 236, nombre: "Jorge Almada" },
            { id: 237, nombre: "Gonzalo Correa" },
            { id: 238, nombre: "Pablo Mercadal" },
            { id: 239, nombre: "Verónica Echevarría" },
            { id: 240, nombre: "Andrea Curbelo" },
            { id: 241, nombre: "Washington Villar" },
            { id: 242, nombre: "Sabrina Aguilar" },
            { id: 243, nombre: "Soraya Buelmo" },
            { id: 244, nombre: "Marlon Goes" },
            { id: 245, nombre: "Virginia Diaz" },
            { id: 246, nombre: "Oscar Ibarra" },
            { id: 247, nombre: "Claudia Sequeira" },
            { id: 248, nombre: "Claudia Buelmo" },
            { id: 249, nombre: "Mayra Buelmo" },
            { id: 251, nombre: "Adriana Menéndez" },
            { id: 253, nombre: "Juan Pablo Gallulo" },
            { id: 254, nombre: "Belén González" },
            { id: 256, nombre: "Francesca Delgado" },
            { id: 257, nombre: "Juan Rosa" },
            { id: 258, nombre: "Florencia Muñoz" },
            { id: 259, nombre: "Jorge Coímbra" },
            { id: 261, nombre: "Roberto Martínez" },
            { id: 262, nombre: "Katherine Cheda" },
            { id: 265, nombre: "Kevin Guaraglia" },
            { id: 266, nombre: "María Noel Carbajal" },
            { id: 267, nombre: "Martin Salfibia" },
            { id: 268, nombre: "Maximiliano Cisnero" },
            { id: 269, nombre: "Claudia Rios" }
        ];

        // Administradores autorizados
        const administradores = [240, 245, 266]; // Andrea Curbelo, Virginia Diaz, María Noel Carbajal
        const passwordAdmin = "Molas2026";

        // Estado de la aplicación
        let mesActual = 3; // Abril (0-indexed: 3)
        let anioActual = 2026;
        let esAdmin = false;
        let diaSeleccionado = null;

        // Cargar guardias del localStorage
        function cargarGuardias() {
            const data = localStorage.getItem('guardias_covisuel_2026_2027');
            return data ? JSON.parse(data) : {};
        }

        // Guardar guardias en localStorage
        function guardarGuardias(guardias) {
            localStorage.setItem('guardias_covisuel_2026_2027', JSON.stringify(guardias));
        }

        // Inicializar selectores de socios
        function inicializarSocios() {
            const selectSocio = document.getElementById('socio');
            const selectCubierto = document.getElementById('socioCubierto');
            
            socios.forEach(socio => {
                const option1 = new Option(`${socio.nombre} (${socio.id})`, socio.id);
                const option2 = new Option(`${socio.nombre} (${socio.id})`, socio.id);
                selectSocio.add(option1);
                selectCubierto.add(option2);
            });
        }

        // Mostrar mensaje
        function mostrarMensaje(texto, tipo) {
            const mensaje = document.getElementById('mensaje');
            mensaje.textContent = texto;
            mensaje.className = `mensaje ${tipo}`;
            setTimeout(() => {
                mensaje.className = 'mensaje';
            }, 4000);
        }

        // Mostrar sección de colaborador
        function mostrarColaborador() {
            const section = document.getElementById('colaboradorSection');
            section.classList.toggle('active');
        }

        // Validar selección
        function validarSeleccion() {
            const socioId = document.getElementById('socio').value;
            const turno = document.getElementById('turno').value;

            if (!socioId) {
                mostrarMensaje('Por favor seleccione un socio', 'error');
                return null;
            }
            if (!turno) {
                mostrarMensaje('Por favor seleccione un turno', 'error');
                return null;
            }

            return { socioId: parseInt(socioId), turno };
        }

        // Registrar como núcleo
        function registrarNucleo() {
            const datos = validarSeleccion();
            if (!datos) return;

            const hoy = new Date();
            const fecha = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
            
            registrarGuardia(fecha, datos.socioId, datos.turno, 'nucleo', null);
        }

        // Registrar como colaborador
        function registrarColaborador() {
            const datos = validarSeleccion();
            if (!datos) return;

            const socioCubierto = document.getElementById('socioCubierto').value;
            if (!socioCubierto) {
                mostrarMensaje('Por favor seleccione el socio que está cubriendo', 'error');
                return;
            }

            const hoy = new Date();
            const fecha = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${String(hoy.getDate()).padStart(2, '0')}`;
            
            registrarGuardia(fecha, datos.socioId, datos.turno, 'colaborador', parseInt(socioCubierto));
        }

        // Registrar guardia
        function registrarGuardia(fecha, socioId, turno, tipo, socioCubierto) {
            const guardias = cargarGuardias();
            const clave = `${fecha}_${turno}`;

            if (!guardias[clave]) {
                guardias[clave] = [];
            }

            // Verificar límite de 3 por turno
            if (guardias[clave].length >= 3) {
                mostrarMensaje(`El turno de ${turno} para esta fecha ya está completo (3 socios máximo)`, 'error');
                return;
            }

            // Verificar si el socio ya está registrado en este turno
            if (guardias[clave].some(g => g.socioId === socioId)) {
                mostrarMensaje('Este socio ya está registrado en este turno', 'error');
                return;
            }

            const socio = socios.find(s => s.id === socioId);
            const registro = {
                socioId,
                nombre: socio.nombre,
                tipo,
                socioCubierto: socioCubierto ? socios.find(s => s.id === socioCubierto)?.nombre : null,
                timestamp: new Date().toISOString()
            };

            guardias[clave].push(registro);
            guardarGuardias(guardias);

            // Limpiar formulario
            document.getElementById('socio').value = '';
            document.getElementById('turno').value = '';
            document.getElementById('socioCubierto').value = '';
            document.getElementById('colaboradorSection').classList.remove('active');

            mostrarMensaje(`✅ ${socio.nombre} registrado como ${tipo} en turno ${turno}`, 'exito');
            renderizarCalendario();
        }

        // Cambiar mes
        function cambiarMes(direccion) {
            mesActual += direccion;
            
            if (mesActual > 11) {
                mesActual = 0;
                anioActual++;
            } else if (mesActual < 0) {
                mesActual = 11;
                anioActual--;
            }

            // Limitar al rango abril 2026 - diciembre 2027
            if (anioActual < 2026 || (anioActual === 2026 && mesActual < 3)) {
                mesActual = 3;
                anioActual = 2026;
            }
            if (anioActual > 2027 || (anioActual === 2027 && mesActual > 11)) {
                mesActual = 11;
                anioActual = 2027;
            }

            renderizarCalendario();
        }

        // Renderizar calendario
        function renderizarCalendario() {
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            document.getElementById('mesActual').textContent = `${meses[mesActual]} ${anioActual}`;

            const calendario = document.getElementById('calendario');
            // Mantener los headers
            calendario.innerHTML = `
                <div class="dia-header">Dom</div>
                <div class="dia-header">Lun</div>
                <div class="dia-header">Mar</div>
                <div class="dia-header">Mié</div>
                <div class="dia-header">Jue</div>
                <div class="dia-header">Vie</div>
                <div class="dia-header">Sáb</div>
            `;

            const primerDia = new Date(anioActual, mesActual, 1);
            const ultimoDia = new Date(anioActual, mesActual + 1, 0);
            const diasEnMes = ultimoDia.getDate();
            const primerDiaSemana = primerDia.getDay();

            const guardias = cargarGuardias();

            // Días vacíos al inicio
            for (let i = 0; i < primerDiaSemana; i++) {
                const diaVacio = document.createElement('div');
                diaVacio.className = 'dia vacio';
                calendario.appendChild(diaVacio);
            }

            // Días del mes
            for (let dia = 1; dia <= diasEnMes; dia++) {
                const fecha = `${anioActual}-${String(mesActual + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const claveTarde = `${fecha}_tarde`;
                const claveNoche = `${fecha}_noche`;

                const guardiasTarde = guardias[claveTarde] || [];
                const guardiasNoche = guardias[claveNoche] || [];
                const totalGuardias = guardiasTarde.length + guardiasNoche.length;

                const diaDiv = document.createElement('div');
                diaDiv.className = 'dia';
                
                // Determinar color según cantidad de guardias
                if (totalGuardias >= 6) {
                    diaDiv.classList.add('rojo');
                } else if (totalGuardias >= 2) {
                    diaDiv.classList.add('amarillo');
                } else {
                    diaDiv.classList.add('verde');
                }

                diaDiv.innerHTML = `
                    <div class="dia-numero">${dia}</div>
                    ${guardiasTarde.length > 0 ? `<span class="turno-indicador turno-tarde">T: ${guardiasTarde.length}/3</span>` : ''}
                    ${guardiasNoche.length > 0 ? `<span class="turno-indicador turno-noche">N: ${guardiasNoche.length}/3</span>` : ''}
                `;

                diaDiv.onclick = () => abrirModal(fecha, guardiasTarde, guardiasNoche);
                calendario.appendChild(diaDiv);
            }
        }

        // Abrir modal con detalles del día
        function abrirModal(fecha, guardiasTarde, guardiasNoche) {
            diaSeleccionado = fecha;
            const modal = document.getElementById('modalDia');
            const titulo = document.getElementById('modalTitulo');
            const contenido = document.getElementById('modalContenido');

            const fechaFormateada = new Date(fecha + 'T12:00:00').toLocaleDateString('es-UY', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            titulo.textContent = `📅 ${fechaFormateada}`;

            let html = '';

            if (guardiasTarde.length > 0 || guardiasNoche.length > 0) {
                if (guardiasTarde.length > 0) {
                    html += '<h4 style="margin: 15px 0 10px; color: #856404;">🌅 Turno Tarde (18:00 - 23:00)</h4>';
                    guardiasTarde.forEach((g, idx) => {
                        html += crearItemGuardia(g, 'tarde', idx);
                    });
                }

                if (guardiasNoche.length > 0) {
                    html += '<h4 style="margin: 15px 0 10px; color: #0c5460;">🌙 Turno Noche (23:00 - 07:00)</h4>';
                    guardiasNoche.forEach((g, idx) => {
                        html += crearItemGuardia(g, 'noche', idx);
                    });
                }
            } else {
                html = '<p style="text-align: center; color: #666; padding: 30px;">No hay guardias registradas para este día.</p>';
            }

            contenido.innerHTML = html;
            modal.classList.add('active');
        }

        // Crear item de guardia
        function crearItemGuardia(guardia, turno, index) {
            const esColaborador = guardia.tipo === 'colaborador';
            return `
                <div class="guardia-item ${esColaborador ? 'colaborador' : ''}">
                    <div>
                        <strong>${guardia.nombre}</strong>
                        <br>
                        <small>${esColaborador ? `🤝 Colaborador (cubre a ${guardia.socioCubierto})` : '🔵 Núcleo'}</small>
                    </div>
                    ${esAdmin ? `<button class="btn-eliminar" onclick="eliminarGuardia('${turno}', ${index})">🗑️ Eliminar</button>` : ''}
                </div>
            `;
        }

        // Cerrar modal
        function cerrarModal() {
            document.getElementById('modalDia').classList.remove('active');
        }

        // Eliminar guardia (solo admin)
        function eliminarGuardia(turno, index) {
            if (!esAdmin) {
                alert('Solo los administradores pueden eliminar guardias.');
                return;
            }

            if (!confirm('¿Está seguro de eliminar esta guardia?')) return;

            const guardias = cargarGuardias();
            const clave = `${diaSeleccionado}_${turno}`;

            if (guardias[clave] && guardias[clave][index]) {
                guardias[clave].splice(index, 1);
                if (guardias[clave].length === 0) {
                    delete guardias[clave];
                }
                guardarGuardias(guardias);
                renderizarCalendario();
                
                // Recargar modal
                const guardiasTarde = guardias[`${diaSeleccionado}_tarde`] || [];
                const guardiasNoche = guardias[`${diaSeleccionado}_noche`] || [];
                abrirModal(diaSeleccionado, guardiasTarde, guardiasNoche);
            }
        }

        // Verificar administrador
        function verificarAdmin() {
            const password = document.getElementById('adminPassword').value;
            
            if (password === passwordAdmin) {
                esAdmin = true;
                mostrarMensaje('✅ Acceso de administrador concedido', 'exito');
                document.getElementById('adminPassword').value = '';
            } else {
                mostrarMensaje('❌ Contraseña incorrecta', 'error');
            }
        }

        // Compartir por WhatsApp
        function compartirWhatsApp() {
            const guardias = cargarGuardias();
            const guardiasTarde = guardias[`${diaSeleccionado}_tarde`] || [];
            const guardiasNoche = guardias[`${diaSeleccionado}_noche`] || [];

            const fechaFormateada = new Date(diaSeleccionado + 'T12:00:00').toLocaleDateString('es-UY', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            let mensaje = `🛡️ *Guardias COVISUEL*\n📅 ${fechaFormateada}\n\n`;

            if (guardiasTarde.length > 0) {
                mensaje += `🌅 *Turno Tarde (18:00 - 23:00)*\n`;
                guardiasTarde.forEach(g => {
                    mensaje += `• ${g.nombre} ${g.tipo === 'colaborador' ? `(cubre a ${g.socioCubierto})` : '(Núcleo)'}\n`;
                });
                mensaje += '\n';
            }

            if (guardiasNoche.length > 0) {
                mensaje += `🌙 *Turno Noche (23:00 - 07:00)*\n`;
                guardiasNoche.forEach(g => {
                    mensaje += `• ${g.nombre} ${g.tipo === 'colaborador' ? `(cubre a ${g.socioCubierto})` : '(Núcleo)'}\n`;
                });
            }

            if (guardiasTarde.length === 0 && guardiasNoche.length === 0) {
                mensaje += 'No hay guardias registradas para este día.';
            }

            const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('modalDia').addEventListener('click', function(e) {
            if (e.target === this) {
                cerrarModal();
            }
        });

        // Inicializar aplicación
        document.addEventListener('DOMContentLoaded', function() {
            inicializarSocios();
            renderizarCalendario();
        });
    </script>
</body>
</html>
