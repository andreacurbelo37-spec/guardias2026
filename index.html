<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Guardias COVISUEL 2026-2027</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn.whatsapp {
            background: #25D366;
            color: white;
        }

        .nav-btn.whatsapp:hover {
            background: #128C7E;
            transform: scale(1.05);
        }

        .nav-btn.excel {
            background: #217346;
            color: white;
        }

        .nav-btn.excel:hover {
            background: #1e6b40;
            transform: scale(1.05);
        }

        .calendar-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .calendar-header h2 {
            font-size: 1.8rem;
            color: #1a1a2e;
        }

        .month-nav {
            display: flex;
            gap: 10px;
        }

        .month-nav button {
            padding: 10px 20px;
            border: none;
            background: #1a1a2e;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .month-nav button:hover {
            background: #16213e;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #1a1a2e;
            padding: 10px;
            font-size: 0.9rem;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            min-height: 60px;
        }

        .day:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .day.empty {
            background: transparent;
            cursor: default;
        }

        .day.green {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }

        .day.yellow {
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
            color: white;
        }

        .day.red {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .day-number {
            font-size: 1.2rem;
        }

        .day-count {
            font-size: 0.7rem;
            opacity: 0.9;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }

        .legend-color.green { background: linear-gradient(135deg, #00b894, #00cec9); }
        .legend-color.yellow { background: linear-gradient(135deg, #fdcb6e, #f39c12); }
        .legend-color.red { background: linear-gradient(135deg, #e74c3c, #c0392b); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #1a1a2e;
            font-size: 1.3rem;
        }

        .close-btn {
            background: #e74c3c;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #c0392b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group select:focus {
            outline: none;
            border-color: #1a1a2e;
        }

        /* Botones Núcleo/Colaborador */
        .tipo-buttons {
            display: flex;
            gap: 10px;
        }

        .tipo-btn {
            flex: 1;
            padding: 15px 10px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            font-weight: 600;
        }

        .tipo-btn:hover {
            border-color: #1a1a2e;
        }

        .tipo-btn.active.nucleo {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .tipo-btn.active.colaborador {
            background: #9b59b6;
            color: white;
            border-color: #9b59b6;
        }

        .colaborador-field {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f3e5f5;
            border-radius: 10px;
            border: 2px solid #9b59b6;
        }

        .colaborador-field.active {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,184,148,0.4);
        }

        .registered-list {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .registered-list h4 {
            margin-bottom: 15px;
            color: #1a1a2e;
        }

        .shift-section {
            margin-bottom: 20px;
        }

        .shift-title {
            font-weight: 600;
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .shift-title.tarde {
            background: #fdcb6e;
            color: #1a1a2e;
        }

        .shift-title.noche {
            background: #1a1a2e;
            color: white;
        }

        .registered-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .registered-item.nucleo {
            border-left: 4px solid #3498db;
        }

        .registered-item.colaborador {
            border-left: 4px solid #9b59b6;
        }

        .registered-info {
            flex: 1;
        }

        .registered-name {
            font-weight: 600;
            color: #1a1a2e;
        }

        .registered-type {
            font-size: 0.85rem;
            color: #666;
            margin-top: 3px;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .shift-count {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .no-registros {
            color: #999;
            font-style: italic;
            padding: 10px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.6rem;
            }

            .calendar-header {
                flex-direction: column;
                text-align: center;
            }

            .day {
                min-height: 50px;
            }

            .day-number {
                font-size: 1rem;
            }

            .tipo-buttons {
                flex-direction: column;
            }

            .weekday {
                font-size: 0.75rem;
                padding: 5px;
            }
        }
   .logo-container {
    width: 80px;

.logo {
    width: 100%;

    object-fit: cover;
    border-radius: 50%;
} </style>
</head>

    <div class="container">
       <div class="header">
    <div class="logo-container">
        <img src="Covisuel logo para llavero.jpg" alt="COVISUEL" class="logo">

    <h1>Sistema de Guardias</h1>
    <p>COVISUEL 2026-2027</p>
</div>

        <div class="nav-buttons">
            <button class="nav-btn whatsapp" onclick="compartirWhatsApp()">

            </button>
            <button class="nav-btn excel" onclick="descargarCSV()">

            </button>

        <div class="calendar-container">
            <div class="calendar-header">
                <h2 id="currentMonth">Abril 2026</h2>
                <div class="month-nav">
                    <button onclick="cambiarMes(-1)">◀ Anterior</button>
                    <button onclick="cambiarMes(1)">Siguiente ▶</button>
                </div>
            </div>

            <div class="weekdays">
                <div class="weekday">Dom</div>
                <div class="weekday">Lun</div>
                <div class="weekday">Mar</div>
                <div class="weekday">Mié</div>
                <div class="weekday">Jue</div>
                <div class="weekday">Vie</div>

            <div class="days-grid" id="daysGrid"></div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color green"></div>
                    <span>Libre (0-1)</span>
                </div>
                <div class="legend-item">

                    <span>Completo (6)</span>

    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">📅 Registrar Guardia</h3>
                <button class="close-btn" onclick="cerrarModal()">✕</button>
            </div>

            <form id="guardiaForm" onsubmit="registrarGuardia(event)">
                <div class="form-group">
                    <label>👤 Seleccioná tu nombre:</label>
                    <select id="socioSelect" required>
                        <option value="">-- Elegir socio --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📋 Tipo de guardia:</label>
                    <div class="tipo-buttons">
                        <button type="button" class="tipo-btn nucleo active" onclick="seleccionarTipo('nucleo')">
                            👤 Soy Núcleo
                        </button>
                        <button type="button" class="tipo-btn colaborador" onclick="seleccionarTipo('colaborador')">
                            🤝 Soy Colaborador
                        </button>
                    </div>
                </div>

                <div class="colaborador-field" id="colaboradorField">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>🎯 ¿A quién le cubrís la guardia?</label>
                        <select id="socioParaSelect">
                            <option value="">-- Elegir socio --</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>⏰ Turno:</label>
                    <select id="turnoSelect" required>
                        <option value="">-- Elegir turno --</option>
                        <option value="tarde">🌅 Tarde (18:00 - 23:00)</option>
                        <option value="noche">🌙 Noche (23:00 - 07:00)</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">✅ Registrar Guardia</button>
            </form>

            <div class="registered-list">
                <h4>📋 Guardias de este día:</h4>
                <div id="registeredContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== LISTA DE SOCIOS CORRECTA ==========
        const socios = [
            { id: 215, nombre: "Mary Yacqueline Cunha Gómez" },
            { id: 222, nombre: "Mariana Gissel Arias D'ottone" },
            { id: 223, nombre: "Claudia Erika Peña Mármol" },
            { id: 225, nombre: "Stephanie Arias" },
            { id: 228, nombre: "Eduardo Sequeira" },
            { id: 230, nombre: "Alejandra Cabrera" },
            { id: 236, nombre: "Jorge Almada" },
            { id: 237, nombre: "Gonzalo Correa" },
            { id: 238, nombre: "Pablo Mercadal" },
            { id: 239, nombre: "Verónica Echevarría" },
            { id: 240, nombre: "Andrea Curbelo" },
            { id: 241, nombre: "Washington Villar" },
            { id: 242, nombre: "Sabrina Aguilar" },
            { id: 243, nombre: "Soraya Buelmo" },
            { id: 244, nombre: "Marlon Goes" },
            { id: 245, nombre: "Virginia Diaz" },
            { id: 246, nombre: "Oscar Ibarra" },
            { id: 247, nombre: "Claudia Sequeira" },
            { id: 248, nombre: "Claudia Buelmo" },
            { id: 249, nombre: "Mayra Buelmo" },
            { id: 251, nombre: "Adriana Menéndez" },
            { id: 253, nombre: "Juan Pablo Gallulo" },
            { id: 254, nombre: "Belén González" },
            { id: 256, nombre: "Francesca Delgado" },
            { id: 257, nombre: "Juan Rosa" },
            { id: 258, nombre: "Florencia Muñoz" },
            { id: 259, nombre: "Jorge Coímbra" },
            { id: 261, nombre: "Roberto Martínez" },
            { id: 262, nombre: "Katherine Cheda" },
            { id: 265, nombre: "Kevin Guaraglia" },
            { id: 266, nombre: "María Noel Carbajal" },
            { id: 267, nombre: "Martin Salfibia" },
            { id: 268, nombre: "Maximiliano Cisnero" },
            { id: 269, nombre: "Claudia Rios" }
        ];

        // Administradores (pueden eliminar guardias)
        const admins = [240, 245, 266];
        const adminPassword = "Molas2026";

        // Variables
        let currentMonth = 3; // Abril
        let currentYear = 2026;
        let selectedDate = null;
        let tipoSeleccionado = 'nucleo';

        // Cargar guardias
        function cargarGuardias() {
            const data = localStorage.getItem('guardias_covisuel_2026_2027');
            return data ? JSON.parse(data) : {};
        }

        // Guardar guardias
        function guardarGuardias(guardias) {
            localStorage.setItem('guardias_covisuel_2026_2027', JSON.stringify(guardias));
        }

        // Inicializar selects
        function inicializarSelects() {
            const socioSelect = document.getElementById('socioSelect');
            const socioParaSelect = document.getElementById('socioParaSelect');
            
            socioSelect.innerHTML = '<option value="">-- Elegir socio --</option>';
            socioParaSelect.innerHTML = '<option value="">-- Elegir socio --</option>';
            
            socios.forEach(socio => {
                const opt1 = document.createElement('option');
                opt1.value = socio.id;
                opt1.textContent = `${socio.nombre} (${socio.id})`;
                socioSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = socio.id;
                opt2.textContent = `${socio.nombre} (${socio.id})`;
                socioParaSelect.appendChild(opt2);
            });
        }

        // Seleccionar tipo
        function seleccionarTipo(tipo) {
            tipoSeleccionado = tipo;
            
            document.querySelectorAll('.tipo-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tipo-btn.${tipo}`).classList.add('active');
            
            const field = document.getElementById('colaboradorField');
            if (tipo === 'colaborador') {
                field.classList.add('active');
            } else {
                field.classList.remove('active');
            }
        }

        // Renderizar calendario
        function renderizarCalendario() {
            const grid = document.getElementById('daysGrid');
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            document.getElementById('currentMonth').textContent = `${meses[currentMonth]} ${currentYear}`;
            
            const primerDia = new Date(currentYear, currentMonth, 1).getDay();
            const diasEnMes = new Date(currentYear, currentMonth + 1, 0).getDate();
            const guardias = cargarGuardias();
            
            let html = '';
            
            for (let i = 0; i < primerDia; i++) {
                html += '<div class="day empty"></div>';
            }
            
            for (let dia = 1; dia <= diasEnMes; dia++) {
                const fechaKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const guardiasDelDia = guardias[fechaKey] || [];
                const total = guardiasDelDia.length;
                
                let color = 'green';
                if (total >= 2 && total < 6) color = 'yellow';
                if (total >= 6) color = 'red';
                
                html += `
                    <div class="day ${color}" onclick="abrirModal('${fechaKey}')">
                        <span class="day-number">${dia}</span>
                        <span class="day-count">${total}/6</span>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        // Cambiar mes
        function cambiarMes(delta) {
            currentMonth += delta;
            
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            
            // Límites: Abril 2026 - Diciembre 2027
            if (currentYear < 2026 || (currentYear === 2026 && currentMonth < 3)) {
                currentMonth = 3;
                currentYear = 2026;
            }
            if (currentYear > 2027) {
                currentMonth = 11;
                currentYear = 2027;
            }
            
            renderizarCalendario();
        }

        // Abrir modal
        function abrirModal(fechaKey) {
            selectedDate = fechaKey;
            const [year, month, day] = fechaKey.split('-');
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            document.getElementById('modalTitle').textContent = `📅 ${parseInt(day)} de ${meses[parseInt(month) - 1]} ${year}`;
            
            // Reset
            document.getElementById('socioSelect').value = '';
            document.getElementById('turnoSelect').value = '';
            document.getElementById('socioParaSelect').value = '';
            seleccionarTipo('nucleo');
            
            actualizarListaRegistrados();
            document.getElementById('modal').classList.add('active');
        }

        // Cerrar modal
        function cerrarModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Actualizar lista
        function actualizarListaRegistrados() {
            const guardias = cargarGuardias();
            const guardiasDelDia = guardias[selectedDate] || [];
            
            const tarde = guardiasDelDia.filter(g => g.turno === 'tarde');
            const noche = guardiasDelDia.filter(g => g.turno === 'noche');
            
            let html = '';
            
            // Tarde
            html += '<div class="shift-section">';
            html += '<div class="shift-title tarde">🌅 Tarde (18:00 - 23:00)</div>';
            if (tarde.length === 0) {
                html += '<p class="no-registros">Sin registros</p>';
            } else {
                tarde.forEach((g, idx) => {
                    const tipoTexto = g.tipo === 'colaborador' ? `Colaborador de ${g.socioPara}` : 'Núcleo';
                    html += `
                        <div class="registered-item ${g.tipo || 'nucleo'}">
                            <div class="registered-info">
                                <div class="registered-name">${g.nombre} (${g.socioId})</div>
                                <div class="registered-type">${tipoTexto}</div>
                            </div>
                            <button class="delete-btn" onclick="eliminarGuardia('tarde', ${idx})">🗑️</button>
                        </div>
                    `;
                });
            }
            html += `<p class="shift-count">📊 ${tarde.length}/3 registrados</p>`;
            html += '</div>';
            
            // Noche
            html += '<div class="shift-section">';
            html += '<div class="shift-title noche">🌙 Noche (23:00 - 07:00)</div>';
            if (noche.length === 0) {
                html += '<p class="no-registros">Sin registros</p>';
            } else {
                noche.forEach((g, idx) => {
                    const tipoTexto = g.tipo === 'colaborador' ? `Colaborador de ${g.socioPara}` : 'Núcleo';
                    html += `
                        <div class="registered-item ${g.tipo || 'nucleo'}">
                            <div class="registered-info">
                                <div class="registered-name">${g.nombre} (${g.socioId})</div>
                                <div class="registered-type">${tipoTexto}</div>
                            </div>
                            <button class="delete-btn" onclick="eliminarGuardia('noche', ${idx})">🗑️</button>
                        </div>
                    `;
                });
            }
            html += `<p class="shift-count">📊 ${noche.length}/3 registrados</p>`;
            html += '</div>';
            
            document.getElementById('registeredContent').innerHTML = html;
        }

        // Registrar guardia
        function registrarGuardia(event) {
            event.preventDefault();
            
            const socioId = parseInt(document.getElementById('socioSelect').value);
            const turno = document.getElementById('turnoSelect').value;
            const socioParaId = document.getElementById('socioParaSelect').value;
            
            if (!socioId || !turno) {
                alert('⚠️ Completá todos los campos');
                return;
            }
            
            if (tipoSeleccionado === 'colaborador' && !socioParaId) {
                alert('⚠️ Seleccioná a quién le cubrís la guardia');
                return;
            }
            
            const socio = socios.find(s => s.id === socioId);
            const guardias = cargarGuardias();
            
            if (!guardias[selectedDate]) {
                guardias[selectedDate] = [];
            }
            
            // Verificar límite
            const turnoGuardias = guardias[selectedDate].filter(g => g.turno === turno);
            if (turnoGuardias.length >= 3) {
                alert(`⚠️ El turno ${turno === 'tarde' ? 'Tarde' : 'Noche'} ya tiene 3 personas`);
                return;
            }
            
            // Verificar duplicado
            const yaRegistrado = guardias[selectedDate].some(g => g.socioId === socioId && g.turno === turno);
            if (yaRegistrado) {
                alert('⚠️ Ya estás registrado en este turno');
                return;
            }
            
            // Crear registro
            const registro = {
                socioId: socioId,
                nombre: socio.nombre,
                turno: turno,
                tipo: tipoSeleccionado
            };
            
            if (tipoSeleccionado === 'colaborador') {
                const socioPara = socios.find(s => s.id === parseInt(socioParaId));
                registro.socioParaId = parseInt(socioParaId);
                registro.socioPara = `${socioPara.nombre} (${socioPara.id})`;
            }
            
            guardias[selectedDate].push(registro);
            guardarGuardias(guardias);
            
            // Reset
            document.getElementById('socioSelect').value = '';
            document.getElementById('turnoSelect').value = '';
            document.getElementById('socioParaSelect').value = '';
            seleccionarTipo('nucleo');
            
            actualizarListaRegistrados();
            renderizarCalendario();
            
            alert('✅ ¡Guardia registrada!');
        }

        // Eliminar guardia
        function eliminarGuardia(turno, index) {
            if (!confirm('🔒 Solo administradores pueden eliminar.\n\n¿Sos administrador/a?')) return;
            
            const pass = prompt('🔑 Contraseña:');
            if (pass !== adminPassword) {
                alert('❌ Contraseña incorrecta');
                return;
            }
            
            const guardias = cargarGuardias();
            const guardiasDelDia = guardias[selectedDate] || [];
            const turnoGuardias = guardiasDelDia.filter(g => g.turno === turno);
            const guardiaEliminar = turnoGuardias[index];
            
            const realIndex = guardiasDelDia.findIndex(g => 
                g.socioId === guardiaEliminar.socioId && g.turno === guardiaEliminar.turno
            );
            
            if (realIndex > -1) {
                guardias[selectedDate].splice(realIndex, 1);
                guardarGuardias(guardias);
                actualizarListaRegistrados();
                renderizarCalendario();
                alert('✅ Guardia eliminada');
            }
        }

        // Compartir WhatsApp
        function compartirWhatsApp() {
            const guardias = cargarGuardias();
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            
            let msg = `🛡️ *GUARDIAS COVISUEL - ${meses[currentMonth]} ${currentYear}*\n\n`;
            
            const diasEnMes = new Date(currentYear, currentMonth + 1, 0).getDate();
            let hay = false;
            
            for (let dia = 1; dia <= diasEnMes; dia++) {
                const fechaKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const guardiasDelDia = guardias[fechaKey] || [];
                
                if (guardiasDelDia.length > 0) {
                    hay = true;
                    msg += `📅 *${dia} de ${meses[currentMonth]}*\n`;
                    
                    const tarde = guardiasDelDia.filter(g => g.turno === 'tarde');
                    const noche = guardiasDelDia.filter(g => g.turno === 'noche');
                    
                    if (tarde.length > 0) {
                        msg += `🌅 Tarde:\n`;
                        tarde.forEach(g => {
                            const tipo = g.tipo === 'colaborador' ? ` (Col.)` : '';
                            msg += `   • ${g.nombre}${tipo}\n`;
                        });
                    }
                    
                    if (noche.length > 0) {
                        msg += `🌙 Noche:\n`;
                        noche.forEach(g => {
                            const tipo = g.tipo === 'colaborador' ? ` (Col.)` : '';
                            msg += `   • ${g.nombre}${tipo}\n`;
                        });
                    }
                    msg += '\n';
                }
            }
            
            if (!hay) msg += 'No hay guardias registradas.\n';
            
            msg += `\n🔗 https://andreacurbelo37-spec.github.io/guardias2026/`;
            
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Descargar CSV
        function descargarCSV() {
            const guardias = cargarGuardias();
            let csv = 'Fecha,ID,Nombre,Tipo,Colaborador De,Turno,Horario\n';
            
            Object.keys(guardias).sort().forEach(fechaKey => {
                const [y, m, d] = fechaKey.split('-');
                guardias[fechaKey].forEach(g => {
                    const horario = g.turno === 'tarde' ? '18:00-23:00' : '23:00-07:00';
                    const tipo = g.tipo === 'colaborador' ? 'Colaborador' : 'Núcleo';
                    const colDe = g.socioPara || '-';
                    csv += `${d}/${m}/${y},${g.socioId},${g.nombre},${tipo},${colDe},${g.turno},${horario}\n`;
                });
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `guardias_covisuel_${currentYear}.csv`;
            link.click();
        }

        // Cerrar modal al clic fuera
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) cerrarModal();
        });

        // Iniciar
        document.addEventListener('DOMContentLoaded', function() {
            inicializarSelects();
            renderizarCalendario();
        });
    </script>
