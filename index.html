            padding-bottom: 80px;

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {

            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .month-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .month-selector select {
            background: #1a1a2e;
            color: #fff;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .day-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .day-cell {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            min-height: 80px;
            padding: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-cell:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .day-cell.empty {
            background: transparent;
            border: none;
            cursor: default;
        }

        .day-number {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 5px;
            color: #667eea;
        }

        .shift-badge {
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 4px;
            margin: 1px 0;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .shift-tarde {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .shift-noche {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #1a1a2e;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #667eea;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
        }

        .close-btn {
            background: #f5576c;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #8892b0;
        }

        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #667eea;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
        }

        .shift-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .shift-btn {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .shift-btn.tarde {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .shift-btn.noche {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #1a1a2e;
        }

        .shift-btn:hover {
            transform: scale(1.05);
        }

        .shift-btn.selected {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .btn-registrar {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-registrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .registered-shifts {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .registered-shifts h3 {
            margin-bottom: 10px;
            font-size: 1rem;
            color: #8892b0;
        }

        .shift-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .shift-item .delete-btn {
            background: #f5576c;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .summary-modal {
            max-width: 600px;
        }

        .summary-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .export-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-top: 1px solid #667eea;
            padding: 10px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .bottom-nav button {
            background: transparent;
            border: none;
            color: #8892b0;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: color 0.3s ease;
        }

        .bottom-nav button.active {
            color: #667eea;
        }

        .bottom-nav .icon {
            font-size: 1.3rem;
        }

            h1 {

            }

                font-size: 0.7rem;
            }

                min-height: 60px;
                padding: 3px;
            }

                font-size: 0.85rem;
            }
            
            .shift-badge {
                font-size: 0.55rem;
                padding: 1px 2px;
            }
            
            .nav-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Sistema de Guardias 2025</h1>
        <p class="subtitle">Gestión de turnos - Abril a Diciembre</p>

        <div class="month-selector">
            <button class="nav-btn" onclick="changeMonth(-1)">← Anterior</button>
            <select id="monthSelect" onchange="renderCalendar()"></select>
            <button class="nav-btn" onclick="changeMonth(1)">Siguiente →</button>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- Modal para registrar guardia -->
    <div class="modal" id="shiftModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Registrar Guardia</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div class="form-group">
                <label>Seleccionar Socio:</label>
                <select id="socioSelect"></select>
            </div>

            <div class="form-group">
                <label>Seleccionar Turno:</label>
                <div class="shift-buttons">
                    <button class="shift-btn tarde" onclick="selectShift('tarde')" id="btnTarde">
                        🌅 TARDE<br>18:00 - 23:00
                    </button>
                    <button class="shift-btn noche" onclick="selectShift('noche')" id="btnNoche">
                        🌙 NOCHE<br>23:00 - 07:00
                    </button>
                </div>
            </div>

            <button class="btn-registrar" onclick="registerShift()">✅ Registrar Guardia</button>

            <div class="registered-shifts" id="registeredShifts"></div>
        </div>
    </div>

    <!-- Modal para resumen -->
    <div class="modal" id="summaryModal">
        <div class="modal-content summary-modal">
            <div class="modal-header">
                <h2>📊 Resumen de Guardias</h2>
                <button class="close-btn" onclick="closeSummaryModal()">×</button>
            </div>
            
            <div class="summary-text" id="summaryText"></div>
            
            <button class="whatsapp-btn" onclick="sendWhatsApp()">
                📱 Enviar por WhatsApp
            </button>
            
            <button class="export-btn" onclick="exportToExcel()">
                📥 Exportar a Excel
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="showCurrentMonth()">
            <span class="icon">📅</span>
            <span>Hoy</span>
        </button>
        <button onclick="showSummary()">
            <span class="icon">📊</span>
            <span>Resumen</span>
        </button>
        <button onclick="showMySummary()">
            <span class="icon">👤</span>
            <span>Mi Resumen</span>
        </button>
        <button onclick="clearAllData()">
            <span class="icon">🗑️</span>
            <span>Limpiar</span>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

            <div class="form-group">
                <label>Seleccionar Turno:</label>
                <div class="shift-buttons">
                    <button class="shift-btn tarde" onclick="selectShift('tarde')" id="btnTarde">
                        🌅 TARDE<br>18:00 - 23:00
                    </button>
                    <button class="shift-btn noche" onclick="selectShift('noche')" id="btnNoche">
                        🌙 NOCHE<br>23:00 - 07:00
                    </button>
                </div>
            </div>

            <button class="btn-registrar" onclick="registerShift()">✅ Registrar Guardia</button>

            <div class="registered-shifts" id="registeredShifts"></div>
        </div>
    </div>

    <!-- Modal para resumen -->
    <div class="modal" id="summaryModal">
        <div class="modal-content summary-modal">
            <div class="modal-header">
                <h2>📊 Resumen de Guardias</h2>
                <button class="close-btn" onclick="closeSummaryModal()">×</button>
            </div>
            
            <div class="summary-text" id="summaryText"></div>
            
            <button class="whatsapp-btn" onclick="sendWhatsApp()">
                📱 Enviar por WhatsApp
            </button>
            
            <button class="export-btn" onclick="exportToExcel()">
                📥 Exportar a Excel
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="showCurrentMonth()">
            <span class="icon">📅</span>
            <span>Hoy</span>
        </button>
        <button onclick="showSummary()">
            <span class="icon">📊</span>
            <span>Resumen</span>
        </button>
        <button onclick="showMySummary()">
            <span class="icon">👤</span>
            <span>Mi Resumen</span>
        </button>
        <button onclick="clearAllData()">
            <span class="icon">🗑️</span>
            <span>Limpiar</span>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
 <script>
        // Lista completa de socios con sus IDs
        const socios = [
            { id: 215, nombre: "Mary Yacqueline Cunha Gómez" },
            { id: 222, nombre: "Mariana Gissel Arias D'ottone" },
            { id: 223, nombre: "Claudia Erika Peña Mármol" },
            { id: 225, nombre: "Stephanie Arias" },
            { id: 228, nombre: "Eduardo Sequeira" },
            { id: 230, nombre: "Alejandra Cabrera" },
            { id: 236, nombre: "Jorge Almada" },
            { id: 237, nombre: "Gonzalo Correa" },
            { id: 238, nombre: "Pablo Mercadal" },
            { id: 239, nombre: "Verónica Echevarría" },
            { id: 240, nombre: "Andrea Curbelo" },
            { id: 241, nombre: "Washington Villar" },
            { id: 242, nombre: "Sabrina Aguilar" },
            { id: 243, nombre: "Soraya Buelmo" },
            { id: 244, nombre: "Marlon Goes" },
            { id: 245, nombre: "Virginia Diaz" },
            { id: 246, nombre: "Oscar Ibarra" },
            { id: 247, nombre: "Claudia Sequeira" },
            { id: 248, nombre: "Claudia Buelmo" },
            { id: 249, nombre: "Mayra Buelmo" },
            { id: 251, nombre: "Adriana Menéndez" },
            { id: 253, nombre: "Juan Pablo Gallulo" },
            { id: 254, nombre: "Belén González" },
            { id: 256, nombre: "Francesca Delgado" },
            { id: 257, nombre: "Juan Rosa" },
            { id: 258, nombre: "Florencia Muñoz" },
            { id: 259, nombre: "Jorge Coímbra" },
            { id: 261, nombre: "Roberto Martínez" },
            { id: 262, nombre: "Katherine Cheda" },
            { id: 265, nombre: "Kevin Guaraglia" },
            { id: 266, nombre: "María Noel Carbajal" },
            { id: 267, nombre: "Martin Salfibia" },
            { id: 268, nombre: "Maximiliano Cisnero" },
            { id: 269, nombre: "Claudia Rios" }
        ];

        // Meses disponibles (Abril a Diciembre 2025)
        const meses = [
            { value: 3, name: "Abril 2025" },
            { value: 4, name: "Mayo 2025" },
            { value: 5, name: "Junio 2025" },
            { value: 6, name: "Julio 2025" },
            { value: 7, name: "Agosto 2025" },
            { value: 8, name: "Septiembre 2025" },
            { value: 9, name: "Octubre 2025" },
            { value: 10, name: "Noviembre 2025" },
            { value: 11, name: "Diciembre 2025" }
        ];

        let currentMonth = 3; // Abril (0-indexed)
        let currentYear = 2025;
        let selectedDate = null;
        let selectedShift = null;
        let guardias = JSON.parse(localStorage.getItem('guardias2025')) || {};

        // Inicialización
        document.addEventListener('DOMContentLoaded', function() {
            initMonthSelector();
            initSocioSelector();
            renderCalendar();
        });

        function initMonthSelector() {
            const select = document.getElementById('monthSelect');
            meses.forEach(mes => {
                const option = document.createElement('option');
                option.value = mes.value;
                option.textContent = mes.name;
                select.appendChild(option);
            });
            select.value = currentMonth;
        }

        function initSocioSelector() {
            const select = document.getElementById('socioSelect');
            select.innerHTML = '<option value="">-- Seleccionar socio --</option>';
            socios.forEach(socio => {
                const option = document.createElement('option');
                option.value = socio.id;
                option.textContent = `${socio.id} - ${socio.nombre}`;
                select.appendChild(option);
            });
        }

        function changeMonth(direction) {
            const select = document.getElementById('monthSelect');
            const currentIndex = meses.findIndex(m => m.value === currentMonth);
            const newIndex = currentIndex + direction;
            
            if (newIndex >= 0 && newIndex < meses.length) {
                currentMonth = meses[newIndex].value;
                select.value = currentMonth;
                renderCalendar();
            }
        }

        function renderCalendar() {
            currentMonth = parseInt(document.getElementById('monthSelect').value);
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Días de la semana
            const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            diasSemana.forEach(dia => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = dia;
                grid.appendChild(header);
            });

            // Primer día del mes y cantidad de días
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startingDay = firstDay.getDay();
            const totalDays = lastDay.getDate();

            // Celdas vacías antes del primer día
            for (let i = 0; i < startingDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                grid.appendChild(emptyCell);
            }

            // Días del mes
            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.onclick = () => openModal(day);

                const dayNumber = document.createElement('div');
                dayNumber.className = 'day-number';
                dayNumber.textContent = day;
                cell.appendChild(dayNumber);

                // Mostrar guardias registradas
                const dateKey = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                if (guardias[dateKey]) {
                    if (guardias[dateKey].tarde && guardias[dateKey].tarde.length > 0) {
                        guardias[dateKey].tarde.forEach(socioId => {
                            const socio = socios.find(s => s.id === socioId);
                            if (socio) {
                                const badge = document.createElement('div');
                                badge.className = 'shift-badge shift-tarde';
                                badge.textContent = `T: ${socio.nombre.split(' ')[0]}`;
                                cell.appendChild(badge);
                            }
                        });
                    }
                    if (guardias[dateKey].noche && guardias[dateKey].noche.length > 0) {
                        guardias[dateKey].noche.forEach(socioId => {
                            const socio = socios.find(s => s.id === socioId);
                            if (socio) {
                                const badge = document.createElement('div');
                                badge.className = 'shift-badge shift-noche';
                                badge.textContent = `N: ${socio.nombre.split(' ')[0]}`;
                                cell.appendChild(badge);
                            }
                        });
                    }
                }

                grid.appendChild(cell);
            }
        }

        function openModal(day) {
            selectedDate = day;
            selectedShift = null;
            document.getElementById('btnTarde').classList.remove('selected');
            document.getElementById('btnNoche').classList.remove('selected');
            document.getElementById('socioSelect').value = '';
            
            const dateStr = `${day}/${currentMonth + 1}/${currentYear}`;
            document.getElementById('modalTitle').textContent = `Registrar Guardia - ${dateStr}`;
            
            document.getElementById('shiftModal').style.display = 'flex';
            updateRegisteredShifts();
        }

        function closeModal() {
            document.getElementById('shiftModal').style.display = 'none';
        }

        function selectShift(shift) {
            selectedShift = shift;
            document.getElementById('btnTarde').classList.remove('selected');
            document.getElementById('btnNoche').classList.remove('selected');
            document.getElementById(`btn${shift.charAt(0).toUpperCase() + shift.slice(1)}`).classList.add('selected');
        }

        function registerShift() {
            const socioId = parseInt(document.getElementById('socioSelect').value);
            
            if (!socioId) {
                alert('Por favor, seleccioná un socio');
                return;
            }
            
            if (!selectedShift) {
                alert('Por favor, seleccioná un turno (Tarde o Noche)');
                return;
            }

            const dateKey = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${selectedDate.toString().padStart(2, '0')}`;
            
            if (!guardias[dateKey]) {
                guardias[dateKey] = { tarde: [], noche: [] };
            }

            // Verificar si ya está registrado
            if (guardias[dateKey][selectedShift].includes(socioId)) {
                alert('Este socio ya está registrado en este turno');
                return;
            }

            guardias[dateKey][selectedShift].push(socioId);
            localStorage.setItem('guardias2025', JSON.stringify(guardias));
            
            renderCalendar();
            updateRegisteredShifts();
            
            // Limpiar selección
            document.getElementById('socioSelect').value = '';
            selectedShift = null;
            document.getElementById('btnTarde').classList.remove('selected');
            document.getElementById('btnNoche').classList.remove('selected');
            
            alert('✅ Guardia registrada correctamente');
        }
  function updateRegisteredShifts() {
            const container = document.getElementById('registeredShifts');
            const dateKey = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${selectedDate.toString().padStart(2, '0')}`;
            
            let html = '';
            
            if (guardias[dateKey]) {
                // Turno Tarde
                if (guardias[dateKey].tarde && guardias[dateKey].tarde.length > 0) {
                    html += '<div class="registered-shift"><strong>🌅 TARDE (18:00 - 23:00):</strong><ul>';
                    guardias[dateKey].tarde.forEach(socioId => {
                        const socio = socios.find(s => s.id === socioId);
                        if (socio) {
                            html += `<li>${socio.id} - ${socio.nombre} <button class="delete-btn" onclick="deleteShift('${dateKey}', 'tarde', ${socioId})">❌</button></li>`;
                        }
                    });
                    html += '</ul></div>';
                }
                
                // Turno Noche
                if (guardias[dateKey].noche && guardias[dateKey].noche.length > 0) {
                    html += '<div class="registered-shift"><strong>🌙 NOCHE (23:00 - 07:00):</strong><ul>';
                    guardias[dateKey].noche.forEach(socioId => {
                        const socio = socios.find(s => s.id === socioId);
                        if (socio) {
                            html += `<li>${socio.id} - ${socio.nombre} <button class="delete-btn" onclick="deleteShift('${dateKey}', 'noche', ${socioId})">❌</button></li>`;
                        }
                    });
                    html += '</ul></div>';
                }
            }
            
            if (html === '') {
                html = '<p style="color: #666; text-align: center;">No hay guardias registradas para este día</p>';
            }
            
            container.innerHTML = html;
        }

        function deleteShift(dateKey, shift, socioId) {
            const socio = socios.find(s => s.id === socioId);
            if (confirm(`¿Eliminar a ${socio.nombre} del turno ${shift}?`)) {
                guardias[dateKey][shift] = guardias[dateKey][shift].filter(id => id !== socioId);
                
                // Limpiar si no hay guardias
                if (guardias[dateKey].tarde.length === 0 && guardias[dateKey].noche.length === 0) {
                    delete guardias[dateKey];
                }
                
                localStorage.setItem('guardias2025', JSON.stringify(guardias));
                renderCalendar();
                updateRegisteredShifts();
            }
        }

        function exportData() {
            let csv = 'Fecha,Turno,ID Socio,Nombre Socio\n';
            
            Object.keys(guardias).sort().forEach(dateKey => {
                const [year, month, day] = dateKey.split('-');
                const dateStr = `${day}/${month}/${year}`;
                
                if (guardias[dateKey].tarde) {
                    guardias[dateKey].tarde.forEach(socioId => {
                        const socio = socios.find(s => s.id === socioId);
                        if (socio) {
                            csv += `${dateStr},Tarde (18:00-23:00),${socio.id},"${socio.nombre}"\n`;
                        }
                    });
                }
                
                if (guardias[dateKey].noche) {
                    guardias[dateKey].noche.forEach(socioId => {
                        const socio = socios.find(s => s.id === socioId);
                        if (socio) {
                            csv += `${dateStr},Noche (23:00-07:00),${socio.id},"${socio.nombre}"\n`;
                        }
                    });
                }
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `guardias_2025_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function clearAllData() {
            if (confirm('⚠️ ¿Estás seguro de eliminar TODAS las guardias registradas?\n\nEsta acción no se puede deshacer.')) {
                if (confirm('🔴 CONFIRMACIÓN FINAL: ¿Eliminar todos los datos?')) {
                    guardias = {};
                    localStorage.removeItem('guardias2025');
                    renderCalendar();
                    alert('✅ Todos los datos han sido eliminados');
                }
            }
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('shiftModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Atajos de teclado
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
